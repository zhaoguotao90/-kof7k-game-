<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳皇KOF7K - 已修复CORS问题</title>
    
    <!-- 使用可靠的Ruffle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.1.0-nightly.2024.1.20/ruffle.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white; min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 3px solid #ffcc00; margin-bottom: 30px; }
        .title {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ffcc00, #ff9900);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 10px;
        }
        .subtitle { color: #4cdfff; font-size: 1.3em; }
        .game-container {
            background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 20px;
            border: 3px solid #ff3333;
        }
        #gameScreen {
            width: 100%; height: 450px;
            display: flex; align-items: center; justify-content: center;
            background: #111;
        }
        .control-panel { text-align: center; margin: 20px 0; }
        .game-btn {
            display: inline-block; padding: 12px 25px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white; border: none; border-radius: 8px;
            font-size: 1.1em; font-weight: bold; cursor: pointer;
            margin: 8px; min-width: 180px;
        }
        .game-btn.test { background: linear-gradient(135deg, #52c41a, #389e0d); }
        .status-info { text-align: center; margin: 20px 0; color: #ccccff; min-height: 24px; }
        .footer {
            text-align: center; margin-top: 30px; padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #9999ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">拳皇KOF7K 通关挑战</h1>
            <p class="subtitle">CORS问题已修复 | 大文件直链加载</p>
        </div>
        
        <div class="status-info">
            <p id="loadStatus">✅ 系统就绪，点击"加载游戏"开始</p>
        </div>
        
        <div class="game-container">
            <div id="gameScreen">
                <div id="loadingText" style="text-align: center; color: #ccccff; padding: 20px;">
                    <div style="font-size: 3em; margin-bottom: 15px;">🎮</div>
                    <h2>拳皇KOF7K 格斗传承</h2>
                    <p style="margin-top: 15px;">CORS问题已修复 | 35MB大文件支持</p>
                </div>
            </div>
        </div>
        
        <div class="control-panel">
            <button class="game-btn" id="loadBtn">加载游戏</button>
            <button class="game-btn test" id="testBtn">测试通关</button>
        </div>
        
        <div class="footer">
            <p>闪翼拳皇 1.91 - 格斗传承 | CORS问题已修复</p>
            <p style="margin-top: 8px;">提示：已解决跨域限制，游戏可正常加载</p>
        </div>
    </div>
    
    <!-- 通关视频弹窗 -->
    <div id="videoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#111; padding:20px; border-radius:10px; max-width:800px; width:90%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="color:#ffcc00;">🎁 通关奖励 - 隐藏彩蛋视频</h3>
                <button onclick="closeVideo()" style="background:#ff3333; color:white; border:none; width:30px; height:30px; border-radius:50%; cursor:pointer;">×</button>
            </div>
            <video id="hiddenVideo" controls style="width:100%; border-radius:5px;">
                <source src="reward_video.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    
    <script>
        // 您的游戏文件直链
        const GAME_FILE_URL = "https://file.wd02.com/dl/5b320d25d4c1f9faab3ec77f3603ddf2.swf";
        
        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            const loadBtn = document.getElementById('loadBtn');
            const testBtn = document.getElementById('testBtn');
            
            loadBtn.addEventListener('click', function() {
                document.getElementById('loadStatus').textContent = '正在加载游戏...';
                loadGame();
            });
            
            testBtn.addEventListener('click', function() {
                document.getElementById('loadStatus').textContent = '测试通关功能...';
                testVictory();
            });
            
            if (localStorage.getItem('kof_victory') === 'true') {
                handleVictory();
            }
        });
        
        // 主加载函数 - 使用CORS代理
        async function loadGame() {
            const gameScreen = document.getElementById('gameScreen');
            const loadBtn = document.getElementById('loadBtn');
            const loadStatus = document.getElementById('loadStatus');
            
            loadBtn.disabled = true;
            loadBtn.textContent = '加载中...';
            
            try {
                if (!window.RufflePlayer || !window.RufflePlayer.newest) {
                    throw new Error('Ruffle播放器未就绪');
                }
                
                // 显示加载界面
                gameScreen.innerHTML = `
                    <div style="color:#ccccff; text-align:center; padding:40px;">
                        <div style="font-size:2em; margin-bottom:20px;">⏳</div>
                        <h3>正在通过CORS代理加载游戏</h3>
                        <p>文件大小: 35MB，请耐心等待...</p>
                        <div style="margin-top:20px; padding:10px; background:rgba(255,255,255,0.1); border-radius:5px;">
                            <div id="progressBar" style="height:4px; background:#1890ff; width:0%; transition:width 0.3s;"></div>
                        </div>
                        <p id="proxyStatus" style="margin-top:10px; color:#4cdfff; font-size:0.9em;">准备尝试代理服务器...</p>
                    </div>
                `;
                
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                
                // 清除旧内容，添加新播放器
                const existingPlayer = document.querySelector('ruffle-player');
                if (existingPlayer) existingPlayer.remove();
                
                gameScreen.innerHTML = '';
                gameScreen.appendChild(player);
                
                // 尝试多个CORS代理
                const proxyAttempts = [
                    { name: 'CORS Anywhere', url: `https://api.allorigins.win/raw?url=${encodeURIComponent(GAME_FILE_URL)}` },
                    { name: 'CORS Proxy', url: `https://corsproxy.io/?${encodeURIComponent(GAME_FILE_URL)}` },
                    { name: 'CodeTabs Proxy', url: `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(GAME_FILE_URL)}` },
                    { name: 'Heroku CORS', url: `https://cors-anywhere.herokuapp.com/${GAME_FILE_URL}` }
                ];
                
                let loadSuccess = false;
                let lastError = null;
                
                // 显示进度
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress = Math.min(progress + 1, 90);
                    const bar = document.getElementById('progressBar');
                    if (bar) bar.style.width = progress + '%';
                }, 600);
                
                // 尝试每个代理
                for (let i = 0; i < proxyAttempts.length; i++) {
                    const attempt = proxyAttempts[i];
                    const statusEl = document.getElementById('proxyStatus');
                    if (statusEl) {
                        statusEl.textContent = `尝试代理 ${i+1}/${proxyAttempts.length}: ${attempt.name}`;
                    }
                    
                    try {
                        console.log(`尝试代理: ${attempt.name} - ${attempt.url}`);
                        
                        const timeoutPromise = new Promise((_, reject) => 
                            setTimeout(() => reject(new Error('代理连接超时')), 20000)
                        );
                        
                        await Promise.race([
                            player.load({ url: attempt.url, width: "100%", height: 450 }),
                            timeoutPromise
                        ]);
                        
                        loadSuccess = true;
                        console.log(`✅ 代理成功: ${attempt.name}`);
                        break;
                        
                    } catch (err) {
                        lastError = err;
                        console.warn(`代理失败 ${attempt.name}:`, err.message);
                    }
                }
                
                clearInterval(progressInterval);
                
                if (!loadSuccess) {
                    throw new Error(`所有CORS代理尝试均失败。最后错误: ${lastError?.message || '未知错误'}`);
                }
                
                // 加载成功
                if (document.getElementById('progressBar')) {
                    document.getElementById('progressBar').style.width = '100%';
                }
                
                loadStatus.textContent = '✅ 游戏加载成功！请开始游戏。';
                loadBtn.textContent = '重新加载游戏';
                loadBtn.disabled = false;
                
                window.rufflePlayer = player;
                setupVictoryListener();
                
            } catch (error) {
                console.error('加载失败:', error);
                loadStatus.textContent = '❌ 加载失败: ' + error.message;
                loadBtn.textContent = '重新加载';
                loadBtn.disabled = false;
                
                gameScreen.innerHTML = `
                    <div style="color:#ff6666; text-align:center; padding:40px;">
                        <div style="font-size:3em; margin-bottom:15px;">❌</div>
                        <h3>CORS代理加载失败</h3>
                        <p>${error.message}</p>
                        <div style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.1); border-radius:8px;">
                            <p><strong>建议操作：</strong></p>
                            <p>1. 检查网络连接后点击"重新加载"</p>
                            <p>2. 如多次失败，可尝试使用VPN</p>
                            <p>3. 文件较大(35MB)，请使用WiFi网络</p>
                        </div>
                        <button onclick="loadGame()" class="game-btn" style="margin-top:20px;">
                            重新加载
                        </button>
                    </div>
                `;
            }
        }
        
        // 通关系统
        function setupVictoryListener() {
            window.addEventListener("message", (event) => {
                if (event.data?.type === "GAME_VICTORY") handleVictory();
            });
            window.onGameVictory = handleVictory;
        }
        
        function handleVictory() {
            if (window.hasVictory) return;
            window.hasVictory = true;
            
            document.getElementById('loadStatus').textContent = '🎉 恭喜通关！';
            
            const videoBtn = document.createElement('button');
            videoBtn.className = 'game-btn';
            videoBtn.style.background = 'linear-gradient(135deg, #ff3366, #cc2255)';
            videoBtn.textContent = '观看通关视频';
            videoBtn.onclick = showVideo;
            
            document.querySelector('.control-panel').appendChild(videoBtn);
            localStorage.setItem('kof_victory', 'true');
        }
        
        function showVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('hiddenVideo');
            
            modal.style.display = 'flex';
            // 防止视频播放被中断
            setTimeout(() => {
                video.play().catch(e => {
                    console.log('视频播放可能需要用户交互，请点击视频控制栏播放');
                });
            }, 100);
        }
        
        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('hiddenVideo');
            video.pause();
            modal.style.display = 'none';
        }
        
        function testVictory() {
            handleVictory();
        }
    </script>
</body>
</html>
