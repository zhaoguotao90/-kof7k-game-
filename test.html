<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳皇KOF7K - 阿里云OSS版</title>
    
    <!-- 使用稳定版Ruffle播放器 -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle@0.1.0/ruffle.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 2.8em;
            background: linear-gradient(45deg, #ffcc00, #ff9900);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #4cdfff;
            font-size: 1.4em;
        }
        
        .game-container {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #ff3333;
        }
        
        #gameScreen {
            width: 100%;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }
        
        .control-panel {
            text-align: center;
            margin: 20px 0;
        }
        
        .game-btn {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            min-width: 160px;
        }
        
        .game-btn:hover {
            background: linear-gradient(135deg, #40a9ff, #096dd9);
        }
        
        .status-info {
            text-align: center;
            margin: 20px 0;
            color: #ccccff;
            min-height: 24px;
        }
        
        .mobile-controls {
            display: none;
            padding: 15px;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .virtual-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff9900, #ff6600);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #9999ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">拳皇KOF7K 通关挑战</h1>
            <p class="subtitle">触碰NFC标签开始游戏</p>
        </div>
        
        <div class="status-info">
            <p id="loadStatus">✅ 系统就绪，点击加载游戏</p>
        </div>
        
        <div class="game-container">
            <div id="gameScreen">
                <div id="loadingText" style="text-align: center; color: #ccccff; padding: 30px;">
                    <div style="font-size: 3em; margin-bottom: 20px;">🎮</div>
                    <h2>拳皇KOF7K 格斗传承</h2>
                    <p style="margin-top: 20px;">光效华丽升级 | 新角色-卢卡尔 | 部分人物Bug修正</p>
                </div>
            </div>
        </div>
        
        <div class="mobile-controls" id="mobileControls">
            <p style="color:#ffcc00; margin-bottom:10px;">手机用户请使用虚拟按键：</p>
            <button class="virtual-btn" onclick="simulateKey('ArrowUp')">↑ 上</button>
            <button class="virtual-btn" onclick="simulateKey('ArrowDown')">↓ 下</button>
            <button class="virtual-btn" onclick="simulateKey('ArrowLeft')">← 左</button>
            <button class="virtual-btn" onclick="simulateKey('ArrowRight')">→ 右</button>
            <br>
            <button class="virtual-btn" onclick="simulateKey('KeyA')" style="background:linear-gradient(135deg, #ff3366, #cc2255);">A 轻拳</button>
            <button class="virtual-btn" onclick="simulateKey('KeyB')" style="background:linear-gradient(135deg, #ff3366, #cc2255);">B 重拳</button>
            <button class="virtual-btn" onclick="simulateKey('KeyC')" style="background:linear-gradient(135deg, #ff3366, #cc2255);">C 轻脚</button>
            <button class="virtual-btn" onclick="simulateKey('KeyD')" style="background:linear-gradient(135deg, #ff3366, #cc2255);">D 重脚</button>
        </div>
        
        <div class="control-panel">
            <button class="game-btn" id="loadBtn">加载游戏</button>
            <button class="game-btn" id="testBtn" style="background: linear-gradient(135deg, #52c41a, #389e0d);">测试通关</button>
        </div>
        
        <div class="footer">
            <p>闪翼拳皇 1.91 - 格斗传承 | 使用Ruffle播放器加载Flash游戏</p>
        </div>
    </div>
    
    <script>
        // 全局变量
        let rufflePlayer = null;
        let isGameLoaded = false;
        
        // 使用您的阿里云OSS域名
        const OSS_BASE_URL = "https://kof7k-game.oss-cn-zhongwei.aliyuncs.com/";
        const GAME_FILE_URL = OSS_BASE_URL + "kof7k_modified.swf";
        
        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            const loadBtn = document.getElementById('loadBtn');
            const testBtn = document.getElementById('testBtn');
            
            loadBtn.addEventListener('click', loadGame);
            testBtn.addEventListener('click', testVictory);
            
            // 检测移动设备
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                document.getElementById('mobileControls').style.display = 'block';
            }
        });
        
        // 游戏加载函数
        async function loadGame() {
            const gameScreen = document.getElementById('gameScreen');
            const loadBtn = document.getElementById('loadBtn');
            const loadStatus = document.getElementById('loadStatus');
            
            loadBtn.disabled = true;
            loadBtn.textContent = '加载中...';
            loadStatus.textContent = '正在加载游戏...';
            
            try {
                // 检查Ruffle播放器
                if (!window.RufflePlayer || !window.RufflePlayer.newest) {
                    throw new Error('Ruffle播放器未加载');
                }
                
                // 创建游戏容器
                gameScreen.innerHTML = '<div style="color:#ccccff; text-align:center; padding:50px;">游戏加载中，请稍候...</div>';
                
                // 创建Ruffle播放器实例
                const ruffle = window.RufflePlayer.newest();
                rufflePlayer = ruffle.createPlayer();
                gameScreen.innerHTML = '';
                gameScreen.appendChild(rufflePlayer);
                
                // 加载游戏文件
                await rufflePlayer.load({
                    url: GAME_FILE_URL,
                    width: "100%",
                    height: 600
                });
                
                // 加载成功
                loadStatus.textContent = '✅ 游戏加载成功！请开始游戏';
                loadBtn.textContent = '重新加载游戏';
                loadBtn.disabled = false;
                isGameLoaded = true;
                
            } catch (error) {
                console.error('加载失败:', error);
                loadStatus.textContent = '❌ 游戏加载失败: ' + error.message;
                loadBtn.textContent = '重新加载';
                loadBtn.disabled = false;
                
                gameScreen.innerHTML = `
                    <div style="color:#ff6666; text-align:center; padding:40px;">
                        <div style="font-size:3em; margin-bottom:15px;">❌</div>
                        <h3>出了些问题 :(</h3>
                        <p>Ruffle 无法加载 Flash SWF 文件。</p>
                        <p>获取权限可能被 CORS 策略阻止。</p>
                        <p style="color:#ccccff; font-size:0.9em;">请确保已正确配置阿里云OSS的CORS规则。</p>
                        <button onclick="loadGame()" class="game-btn" style="margin-top:20px;">
                            重新加载游戏
                        </button>
                    </div>
                `;
            }
        }
        
        // 虚拟按键功能
        function simulateKey(key) {
            if (!rufflePlayer) return;
            
            const event = new KeyboardEvent('keydown', { key: key });
            rufflePlayer.dispatchEvent(event);
            
            setTimeout(() => {
                const eventUp = new KeyboardEvent('keyup', { key: key });
                rufflePlayer.dispatchEvent(eventUp);
            }, 100);
        }
        
        // 通关系统
        function testVictory() {
            if (!isGameLoaded) {
                alert('请先加载游戏');
                return;
            }
            
            // 模拟通关逻辑
            document.getElementById('loadStatus').textContent = '🎉 恭喜通关！点击下方按钮观看隐藏视频';
            
            // 创建视频按钮
            const videoBtn = document.createElement('button');
            videoBtn.className = 'game-btn';
            videoBtn.style.background = 'linear-gradient(135deg, #ff3366, #cc2255)';
            videoBtn.textContent = '观看通关视频';
            videoBtn.onclick = showVideo;
            
            document.querySelector('.control-panel').appendChild(videoBtn);
        }
        
        function showVideo() {
            const videoUrl = OSS_BASE_URL + "reward_video.mp4";
            window.open(videoUrl, '_blank');
        }
    </script>
</body>
</html>
