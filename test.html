<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳皇KOF7K - HTML5版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 0, 0, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 0, 139, 0.1) 0%, transparent 40%);
            z-index: -1;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            z-index: 10;
        }
        
        .title {
            font-size: 3.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(45deg, #ffcc00, #ff9900);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #4cdfff;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        
        .game-container {
            position: relative;
            width: 800px;
            height: 450px;
            border: 4px solid #ffcc00;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        
        canvas {
            background: linear-gradient(to bottom, #222, #000);
            display: block;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
            z-index: 10;
        }
        
        .control-btn {
            background: linear-gradient(to right, #8b0000, #b22222);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 180px;
        }
        
        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            background: linear-gradient(to right, #a00000, #c22222);
        }
        
        .control-btn:active {
            transform: translateY(1px);
        }
        
        .instructions {
            background: rgba(30, 30, 40, 0.8);
            border-radius: 10px;
            padding: 20px;
            margin-top: 25px;
            max-width: 800px;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }
        
        .instructions h3 {
            color: #ffcc00;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .player-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }
        
        .player {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background: rgba(40, 40, 50, 0.6);
            width: 48%;
        }
        
        .player h4 {
            color: #4cdfff;
            margin-bottom: 10px;
        }
        
        .player p {
            margin: 5px 0;
        }
        
        .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ffcc00;
            border-radius: 4px;
            padding: 2px 8px;
            margin: 0 2px;
            font-family: monospace;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.9rem;
            margin-top: 30px;
        }
        
        @media (max-width: 850px) {
            .game-container {
                width: 95%;
                height: 400px;
            }
            
            .title {
                font-size: 2.5rem;
            }
            
            .player-controls {
                flex-direction: column;
                gap: 15px;
            }
            
            .player {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">拳皇KOF7K</h1>
        <p class="subtitle">HTML5版 - 无需Flash插件</p>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>
    
    <div class="controls">
        <button class="control-btn" id="start-btn">▶ 开始游戏</button>
        <button class="control-btn" id="reset-btn">🔄 重新开始</button>
    </div>
    
    <div class="instructions">
        <h3>游戏控制说明</h3>
        <div class="player-controls">
            <div class="player">
                <h4>玩家1 (红方)</h4>
                <p>移动: <span class="key">A</span> <span class="key">D</span></p>
                <p>攻击: <span class="key">W</span> (拳) <span class="key">S</span> (踢)</p>
                <p>必杀技: <span class="key">Q</span></p>
            </div>
            <div class="player">
                <h4>玩家2 (蓝方)</h4>
                <p>移动: <span class="key">←</span> <span class="key">→</span></p>
                <p>攻击: <span class="key">↑</span> (拳) <span class="key">↓</span> (踢)</p>
                <p>必杀技: <span class="key">/</span></p>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>拳皇KOF7K HTML5版 | 无需Flash插件 | 双人对战格斗游戏</p>
    </div>

    <script>
        // 游戏主逻辑
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        
        // 游戏状态
        let gameRunning = false;
        let gameOver = false;
        let winner = null;
        
        // 游戏角色类
        class Fighter {
            constructor(x, y, width, height, color, name, controls) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.color = color;
                this.name = name;
                this.velocityX = 0;
                this.velocityY = 0;
                this.speed = 5;
                this.jumpPower = 15;
                this.gravity = 0.8;
                this.isJumping = false;
                this.isAttacking = false;
                this.attackType = null;
                this.attackCooldown = 0;
                this.health = 100;
                this.energy = 100;
                this.facingRight = color === 'red';
                this.controls = controls;
                this.specialCooldown = 0;
            }
            
            draw() {
                // 绘制角色
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // 绘制角色轮廓
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                
                // 绘制角色名称
                ctx.fillStyle = '#fff';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, this.x + this.width/2, this.y - 10);
                
                // 绘制攻击效果
                if (this.isAttacking) {
                    ctx.fillStyle = '#ffcc00';
                    let attackX = this.facingRight ? this.x + this.width : this.x - 30;
                    ctx.fillRect(attackX, this.y + 20, 30, 20);
                }
            }
            
            update() {
                // 移动角色
                this.x += this.velocityX;
                
                // 重力效果
                this.velocityY += this.gravity;
                this.y += this.velocityY;
                
                // 地面碰撞检测
                if (this.y + this.height > canvas.height - 50) {
                    this.y = canvas.height - this.height - 50;
                    this.velocityY = 0;
                    this.isJumping = false;
                }
                
                // 边界检测
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
                
                // 攻击冷却
                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.specialCooldown > 0) this.specialCooldown--;
                
                // 能量恢复
                if (this.energy < 100) this.energy += 0.2;
            }
            
            move(direction) {
                this.velocityX = direction * this.speed;
                if (direction !== 0) {
                    this.facingRight = direction > 0;
                }
            }
            
            jump() {
                if (!this.isJumping) {
                    this.velocityY = -this.jumpPower;
                    this.isJumping = true;
                }
            }
            
            attack(type) {
                if (this.attackCooldown === 0) {
                    this.isAttacking = true;
                    this.attackType = type;
                    this.attackCooldown = 20;
                    
                    // 短暂攻击效果
                    setTimeout(() => {
                        this.isAttacking = false;
                    }, 300);
                }
            }
            
            specialAttack() {
                if (this.energy >= 30 && this.specialCooldown === 0) {
                    this.isAttacking = true;
                    this.attackType = 'special';
                    this.energy -= 30;
                    this.specialCooldown = 100;
                    
                    // 短暂攻击效果
                    setTimeout(() => {
                        this.isAttacking = false;
                    }, 500);
                }
            }
            
            takeDamage(damage) {
                this.health -= damage;
                if (this.health < 0) this.health = 0;
            }
        }
        
        // 创建角色
        const player1 = new Fighter(150, 300, 40, 80, 'red', '草薙京', {
            left: 'KeyA',
            right: 'KeyD',
            jump: 'KeyW',
            punch: 'KeyS',
            kick: 'KeyW',
            special: 'KeyQ'
        });
        
        const player2 = new Fighter(600, 300, 40, 80, 'blue', '八神庵', {
            left: 'ArrowLeft',
            right: 'ArrowRight',
            jump: 'ArrowUp',
            punch: 'ArrowDown',
            kick: 'ArrowUp',
            special: 'Slash'
        });
        
        // 绘制游戏背景
        function drawBackground() {
            // 绘制渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制地面
            ctx.fillStyle = '#333';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            
            // 绘制地面图案
            ctx.fillStyle = '#444';
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.fillRect(i, canvas.height - 50, 20, 50);
            }
            
            // 绘制游戏标题
            ctx.fillStyle = 'rgba(255, 204, 0, 0.7)';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('KOF7K - HTML5版', canvas.width/2, 40);
            
            // 绘制血条背景
            ctx.fillStyle = '#444';
            ctx.fillRect(50, 20, 200, 20);
            ctx.fillRect(canvas.width - 250, 20, 200, 20);
            
            // 绘制玩家1血条
            ctx.fillStyle = player1.health > 30 ? '#e74c3c' : '#ff0000';
            ctx.fillRect(50, 20, player1.health * 2, 20);
            
            // 绘制玩家2血条
            ctx.fillStyle = player2.health > 30 ? '#3498db' : '#0000ff';
            ctx.fillRect(canvas.width - 250, 20, player2.health * 2, 20);
            
            // 绘制能量条
            ctx.fillStyle = '#444';
            ctx.fillRect(50, 50, 200, 10);
            ctx.fillRect(canvas.width - 250, 50, 200, 10);
            
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(50, 50, player1.energy * 2, 10);
            ctx.fillRect(canvas.width - 250, 50, player2.energy * 2, 10);
            
            // 绘制玩家名称
            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.fillText(player1.name, 50, 15);
            ctx.textAlign = 'right';
            ctx.fillText(player2.name, canvas.width - 50, 15);
        }
        
        // 检测碰撞
        function checkCollision() {
            // 攻击碰撞检测
            if (player1.isAttacking) {
                const attackRange = player1.facingRight ? 
                    {x: player1.x + player1.width, y: player1.y, width: 30, height: player1.height} :
                    {x: player1.x - 30, y: player1.y, width: 30, height: player1.height};
                
                if (detectCollision(attackRange, player2)) {
                    const damage = player1.attackType === 'special' ? 20 : 10;
                    player2.takeDamage(damage);
                }
            }
            
            if (player2.isAttacking) {
                const attackRange = player2.facingRight ? 
                    {x: player2.x + player2.width, y: player2.y, width: 30, height: player2.height} :
                    {x: player2.x - 30, y: player2.y, width: 30, height: player2.height};
                
                if (detectCollision(attackRange, player1)) {
                    const damage = player2.attackType === 'special' ? 20 : 10;
                    player1.takeDamage(damage);
                }
            }
            
            // 玩家碰撞检测
            if (detectCollision(player1, player2)) {
                // 简单的碰撞响应
                if (player1.x < player2.x) {
                    player1.x -= 2;
                    player2.x += 2;
                } else {
                    player1.x += 2;
                    player2.x -= 2;
                }
            }
        }
        
        // 检测两个矩形是否碰撞
        function detectCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        // 检查游戏结束
        function checkGameOver() {
            if (player1.health <= 0 || player2.health <= 0) {
                gameOver = true;
                gameRunning = false;
                winner = player1.health <= 0 ? player2 : player1;
            }
        }
        
        // 绘制游戏结束画面
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ffcc00';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 50);
            
            ctx.fillStyle = '#fff';
            ctx.font = '36px Arial';
            ctx.fillText(`${winner.name} 获胜!`, canvas.width/2, canvas.height/2 + 20);
            
            ctx.font = '24px Arial';
            ctx.fillText('按"重新开始"按钮再玩一次', canvas.width/2, canvas.height/2 + 80);
        }
        
        // 绘制开始画面
        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ffcc00';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('拳皇KOF7K', canvas.width/2, canvas.height/2 - 80);
            
            ctx.fillStyle = '#4cdfff';
            ctx.font = '24px Arial';
            ctx.fillText('HTML5版 - 无需Flash插件', canvas.width/2, canvas.height/2 - 20);
            
            ctx.fillStyle = '#fff';
            ctx.font = '28px Arial';
            ctx.fillText('点击"开始游戏"按钮', canvas.width/2, canvas.height/2 + 50);
        }
        
        // 游戏主循环
        function gameLoop() {
            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!gameRunning && !gameOver) {
                drawStartScreen();
            } else if (gameOver) {
                drawGameOver();
            } else {
                // 绘制游戏元素
                drawBackground();
                player1.update();
                player2.update();
                player1.draw();
                player2.draw();
                
                // 检测碰撞
                checkCollision();
                
                // 检查游戏结束
                checkGameOver();
            }
            
            // 继续游戏循环
            requestAnimationFrame(gameLoop);
        }
        
        // 键盘控制
        const keys = {};
        
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            // 玩家1控制
            if (e.code === player1.controls.left) player1.move(-1);
            if (e.code === player1.controls.right) player1.move(1);
            if (e.code === player1.controls.jump) player1.jump();
            if (e.code === player1.controls.punch) player1.attack('punch');
            if (e.code === player1.controls.kick) player1.attack('kick');
            if (e.code === player1.controls.special) player1.specialAttack();
            
            // 玩家2控制
            if (e.code === player2.controls.left) player2.move(-1);
            if (e.code === player2.controls.right) player2.move(1);
            if (e.code === player2.controls.jump) player2.jump();
            if (e.code === player2.controls.punch) player2.attack('punch');
            if (e.code === player2.controls.kick) player2.attack('kick');
            if (e.code === player2.controls.special) player2.specialAttack();
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            
            // 停止移动
            if (e.code === player1.controls.left || e.code === player1.controls.right) {
                if (!keys[player1.controls.left] && !keys[player1.controls.right]) {
                    player1.move(0);
                }
            }
            
            if (e.code === player2.controls.left || e.code === player2.controls.right) {
before
                    player2.move(0);
                }
            }
        });
        
        // 按钮事件
        startBtn.addEventListener('click', () => {
            if (!gameRunning && !gameOver) {
                gameRunning = true;
                startBtn.textContent = '⏸ 暂停游戏';
            } else if (gameRunning) {
                gameRunning = false;
                startBtn.textContent = '▶ 继续游戏';
            }
        });
        
        resetBtn.addEventListener('click', () => {
            player1.health = 100;
            player1.energy = 100;
            player1.x = 150;
            player1.y = 300;
            
            player2.health = 100;
            player2.energy = 100;
            player2.x = 600;
            player2.y = 300;
            
            gameOver = false;
            gameRunning = false;
            startBtn.textContent = '▶ 开始游戏';
        });
        
        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
