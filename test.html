<!DOCTYPE html>
<html>
<head>
    <title>文件检查工具</title>
</head>
<body>
    <h2>检查分块文件是否存在</h2>
    <div id="result"></div>
    
    <script>
        const files = [
            'game_part_2.b64',
            'game_part_3.b64', 
            'game_part_4.b64',
            'game_part_5.b64',
            'game_part_6.b64',
            'game_part_7.b64',
            'game_part_8.b64',
            'game_part_9.b64',
            'game_part_10.b64',
            'game_part_11.b64'
        ];
        
        async function checkFile(file) {
            try {
                const response = await fetch(file, { 
                    method: 'HEAD', 
                    cache: 'no-cache' 
                });
                if (response.ok) {
                    return { file, exists: true, size: response.headers.get('content-length') };
                } else {
                    return { file, exists: false, status: response.status };
                }
            } catch (error) {
                return { file, exists: false, error: error.message };
            }
        }
        
        async function checkAllFiles() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>正在检查文件...</p>';
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const result = await checkFile(file);
                
                if (result.exists) {
                    resultDiv.innerHTML += `
                        <p style="color:green">
                            ✅ ${file} - 存在 (${Math.round(result.size/1024)}KB)
                        </p>`;
                } else {
                    resultDiv.innerHTML += `
                        <p style="color:red">
                            ❌ ${file} - 不存在 (HTTP ${result.status || 'Error'})
                        </p>`;
                }
            }
        }
        
        // 立即执行
        checkAllFiles();
    </script>
</body>
</html>
