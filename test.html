<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳皇KOF7K - 通关解锁隐藏视频</title>
    
    <!-- 使用可靠的Ruffle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.1.0-nightly.2024.1.20/ruffle.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 2.8em;
            background: linear-gradient(45deg, #ffcc00, #ff9900);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #4cdfff;
            font-size: 1.4em;
        }
        
        /* 游戏容器 */
        .game-container {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }
        
        #gameScreen {
            width: 100%;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }
        
        /* 控制面板 */
        .control-panel {
            text-align: center;
            margin: 20px 0;
        }
        
        .game-btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            min-width: 200px;
        }
        
        .game-btn:hover {
            background: linear-gradient(135deg, #40a9ff, #096dd9);
        }
        
        .game-btn.test {
            background: linear-gradient(135deg, #52c41a, #389e0d);
        }
        
        .game-btn.test:hover {
            background: linear-gradient(135deg, #73d13d, #52c41a);
        }
        
        /* 状态信息 */
        .status-info {
            text-align: center;
            margin: 20px 0;
            color: #ccccff;
        }
        
        /* 调试信息 */
        .debug-info {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .debug-title {
            color: #ffcc00;
            margin-bottom: 10px;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #9999ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1 class="title">拳皇KOF7K 通关挑战</h1>
            <p class="subtitle">通关解锁隐藏视频</p>
        </div>
        
        <!-- 状态信息 -->
        <div class="status-info">
            <p id="loadStatus">系统准备就绪，点击下方按钮开始游戏</p>
        </div>
        
        <!-- 游戏容器 -->
        <div class="game-container">
            <div id="gameScreen">
                <div id="loadingText" style="text-align: center; color: #ccccff; padding: 30px;">
                    <div style="font-size: 3em; margin-bottom: 20px;">🎮</div>
                    <h2>拳皇KOF7K 格斗传承</h2>
                    <p style="margin-top: 20px;">光效华丽升级   新角色-卢卡尔   部分人物Bug修正</p>
                </div>
            </div>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <button class="game-btn" onclick="loadGame()" id="loadBtn">
                加载游戏
            </button>
            <button class="game-btn test" onclick="testVictory()">
                测试通关
            </button>
        </div>
        
        <!-- 调试信息 -->
        <div class="debug-info">
            <div class="debug-title">系统状态</div>
            <div id="debugOutput">等待操作...</div>
        </div>
        
        <!-- 页脚 -->
        <div class="footer">
            <p>闪翼拳皇 1.91 - 格斗传承   使用Ruffle播放器加载Flash游戏</p>
            <p style="margin-top: 10px;">提示：通关后可解锁隐藏彩蛋视频</p>
        </div>
    </div>
    
    <!-- 通关视频弹窗 -->
    <div id="videoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#111; padding:20px; border-radius:10px; max-width:800px; width:90%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="color:#ffcc00;">🎁 通关奖励 - 隐藏彩蛋视频</h3>
                <button onclick="closeVideo()" style="background:#ff3333; color:white; border:none; width:30px; height:30px; border-radius:50%; cursor:pointer;">×</button>
            </div>
            <video id="hiddenVideo" controls style="width:100%; border-radius:5px;">
                <source src="reward_video.mp4" type="video/mp4">
                您的浏览器不支持视频播放
            </video>
        </div>
    </div>
    
    <script>
        // ==================== 全局变量 ====================
        let rufflePlayer = null;
        let isGameLoaded = false;
        let isVictory = false;
        
        // ==================== 调试输出函数 ====================
        function debugLog(message) {
            const debugOutput = document.getElementById('debugOutput');
            const timestamp = new Date().toLocaleTimeString();
            debugOutput.innerHTML = `[${timestamp}] ${message}<br>` + debugOutput.innerHTML;
            console.log(`[DEBUG] ${message}`);
        }
        
        // ==================== 游戏加载函数 ====================
        async function loadGame() {
            debugLog('点击了"加载游戏"按钮');
            
            const gameScreen = document.getElementById('gameScreen');
            const loadBtn = document.getElementById('loadBtn');
            const loadStatus = document.getElementById('loadStatus');
            
            // 更新状态
            loadStatus.textContent = '正在加载Ruffle播放器...';
            loadBtn.disabled = true;
            loadBtn.textContent = '加载中...';
            
            try {
                // 1. 检查Ruffle播放器
                debugLog('检查Ruffle播放器状态...');
                
                if (!window.RufflePlayer) {
                    throw new Error('RufflePlayer对象不存在');
                }
                
                if (!window.RufflePlayer.newest) {
                    throw new Error('RufflePlayer.newest函数不存在');
                }
                
                debugLog('Ruffle播放器检查通过');
                loadStatus.textContent = 'Ruffle加载成功，正在加载游戏...';
                
                // 2. 创建游戏容器
                gameScreen.innerHTML = '<div style="color:#ccccff; text-align:center; padding:50px;">游戏加载中，请稍候...</div>';
                
                // 3. 创建Ruffle播放器实例
                debugLog('创建Ruffle播放器实例...');
                const ruffle = window.RufflePlayer.newest();
                rufflePlayer = ruffle.createPlayer();
                gameScreen.innerHTML = '';
                gameScreen.appendChild(rufflePlayer);
                
                // 4. 加载游戏文件
                debugLog('加载游戏文件...');
                
                // 使用直接的游戏文件链接
                const gameUrl = "https://cdn.jsdelivr.net/gh/zhaoguotao90/-kof7k-游戏-@main/kof7k_modified.swf";
                debugLog(`游戏文件URL: ${gameUrl}`);
                
                // 设置超时
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('游戏加载超时（15秒）')), 15000)
                );
                
                // 游戏加载
                const loadPromise = rufflePlayer.load({
                    url: gameUrl,
                    width: "100%",
                    height: 500
                });
                
                await Promise.race([loadPromise, timeoutPromise]);
                
                // 5. 加载成功
                debugLog('游戏加载成功！');
                loadStatus.textContent = '✅ 游戏加载成功！请开始游戏。';
                loadBtn.textContent = '重新加载游戏';
                loadBtn.disabled = false;
                isGameLoaded = true;
                
                // 6. 设置通关监听
                setupVictoryListener();
                
            } catch (error) {
                debugLog(`加载失败: ${error.message}`);
                loadStatus.textContent = '❌ 游戏加载失败';
                loadBtn.textContent = '重新加载';
                loadBtn.disabled = false;
                
                // 显示详细错误
                gameScreen.innerHTML = `
                    <div style="color:#ff6666; text-align:center; padding:50px;">
                        <div style="font-size:3em; margin-bottom:20px;">❌</div>
                        <h3>游戏加载失败</h3>
                        <p>${error.message}</p>
                        <p style="color:#ff9999; margin-top:20px;">请检查网络连接后重试</p>
                        <button onclick="loadGame()" style="
                            padding: 10px 20px;
                            background: #3366ff;
                            color: white;
                            border: none;
                            border-radius: 5px;
                            margin-top: 20px;
                        ">重新加载</button>
                    </div>
                `;
            }
        }
        
        // ==================== 通关处理 ====================
        function setupVictoryListener() {
            debugLog('设置通关监听器...');
            
            // 方法1：监听消息事件
            window.addEventListener("message", (event) => {
                if (event.data && event.data.type === "GAME_VICTORY") {
                    debugLog('收到通关消息');
                    handleVictory();
                }
            });
            
            // 方法2：外部接口回调
            window.onGameVictory = function() {
                debugLog('通过onGameVictory回调收到通关');
                handleVictory();
            };
            
            // 方法3：通过URL参数检测
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('victory')) {
                debugLog('通过URL参数检测到通关');
                handleVictory();
            }
        }
        
        function handleVictory() {
            if (isVictory) return;
            
            debugLog('处理通关...');
            isVictory = true;
            document.getElementById('loadStatus').textContent = '🎉 恭喜通关！点击下方按钮观看隐藏视频';
            
            // 创建视频按钮
            const videoBtn = document.createElement('button');
            videoBtn.className = 'game-btn';
            videoBtn.style.background = 'linear-gradient(135deg, #ff3366, #cc2255)';
            videoBtn.textContent = '观看通关视频';
            videoBtn.onclick = showVideo;
            
            document.querySelector('.control-panel').appendChild(videoBtn);
            
            // 保存通关状态
            localStorage.setItem('kof_victory', 'true');
        }
        
        function showVideo() {
            debugLog('显示通关视频');
            const videoModal = document.getElementById('videoModal');
            const video = document.getElementById('hiddenVideo');
            
            videoModal.style.display = 'flex';
            video.play().catch(e => {
                debugLog(`视频播放失败: ${e.message}`);
                alert('视频播放失败，请确保视频文件存在');
            });
        }
        
        function closeVideo() {
            const videoModal = document.getElementById('videoModal');
            const video = document.getElementById('hiddenVideo');
            
            video.pause();
            video.currentTime = 0;
            videoModal.style.display = 'none';
        }
        
        // ==================== 测试功能 ====================
        function testVictory() {
            debugLog('点击了"测试通关"按钮');
            handleVictory();
        }
        
        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', () => {window.addEventListener('DOMContentLoaded', () => {
            debugLog('页面加载完成');debugLog('页面加载完成');
            
            // 检查是否已通关
            if (localStorage.getItem('kof_victory') === 'true') {if (localStorage.getItem('kof_victory') === 'true') {
                debugLog('检测到之前的通关状态');debugLog('检测到之前的通关状态');
                handleVictory();handleVictory();
            }
            
            // 初始化Ruffle配置// 初始化Ruffle配置
            if (window.RufflePlayer) {if (window.RufflePlayer) {
                window.RufflePlayer.config = {window.RufflePlayer.config = {
                    "autoplay": "on","autoplay": "on",
                    "unmuteOverlay": "hidden","unmuteOverlay": "hidden",
                    "backgroundColor": "#000000""backgroundColor": "#000000"
                };
                debugLog('Ruffle配置完成');debugLog('Ruffle配置完成');
            }
        });
    </script>
</body>
</html>
