<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拳皇KOF7K - Base64分块加载版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:"Microsoft Yahei",sans-serif;overflow:hidden;touch-action:none;height:100vh;display:flex;flex-direction:column;background-image:radial-gradient(circle at center,#1a1a1a 0%,#000 80%)}
        .header{padding:15px;text-align:center;background:linear-gradient(135deg,#8B0000,#B22222);border-bottom:3px solid #ffcc00;margin-bottom:30px;position:relative;z-index:10}
        .title{font-size:2.8rem;background:linear-gradient(45deg,#ffcc00,#ff9900);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:10px;text-shadow:0 2px 10px rgba(0,0,0,0.5)}
        .subtitle{color:#4cdfff;font-size:1.4rem}
        #game-container{flex:1;width:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
        #loading-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5}
        .loader{width:60px;height:60px;border:5px solid rgba(255,255,255,0.2);border-radius:50%;border-top:5px solid #ff3333;animation:spin 1s linear infinite;margin-bottom:20px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        #loading-text{color:#fff;font-size:1.2rem;text-align:center;max-width:80%;margin-bottom:20px}
        #progress-bar{width:80%;height:6px;background:#333;border-radius:3px;overflow:hidden;margin:20px 0}
        #progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#52c41a,#a0d911);transition:width 0.3s}
        #error-message{display:none;background:rgba(200,0,0,0.7);padding:15px;border-radius:5px;margin-top:15px;text-align:center;max-width:80%}
        #controls{padding:10px;display:flex;justify-content:center;gap:10px;background:rgba(0,0,0,0.7);border-top:1px solid #333}
        .control-btn{background:linear-gradient(to bottom,#444,#222);color:#fff;border:none;border-radius:4px;padding:8px 15px;font-size:0.9rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px}
        .control-btn:hover{background:linear-gradient(to bottom,#555,#333);transform:translateY(-2px)}
        #reward-video{display:none;width:100%;height:100%;object-fit:contain;background:#000;position:fixed;top:0;left:0;z-index:999}
        #close-btn{position:fixed;top:20px;right:20px;z-index:1000;background:#ff4444;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.5);display:none}
        #fullscreen-btn{position:fixed;bottom:20px;right:20px;z-index:1000;background:rgba(0,0,0,0.7);color:#fff;border:1px solid #666;padding:8px 15px;border-radius:5px;cursor:pointer;font-size:14px;display:none}
        @media(max-width:768px){
            .header{padding:10px}
            .title{font-size:2.2rem}
            .subtitle{font-size:1.1rem}
            .control-btn{padding:6px 10px;font-size:0.8rem}
            #close-btn{padding:8px 15px;font-size:14px}
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">拳皇KOF7K - Base64分块加载版</h1>
        <p class="subtitle">突破文件大小限制，纯前端加载</p>
    </div>

    <div id="game-container">
        <div id="loading-overlay">
            <div class="loader"></div>
            <div id="loading-text">正在加载游戏资源，请稍候...</div>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="error-message"></div>
        </div>
    </div>

    <div id="controls">
        <button class="control-btn" id="reload-btn">🔄 重新加载</button>
        <button class="control-btn" id="volume-btn">🔊 音量</button>
        <button class="control-btn" id="test-video-btn">🎬 测试视频</button>
    </div>

    <video id="reward-video" controls playsinline>
        <source src="reward_video.mp4" type="video/mp4">
        您的浏览器不支持视频播放
    </video>
    <button id="close-btn">返回游戏</button>
    <button id="fullscreen-btn">全屏播放</button>

    <script src="ruffle.js"></script>
    <script>
        const gameContainer = document.getElementById('game-container');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const progressBar = document.getElementById('progress-fill');
        const errorMessage = document.getElementById('error-message');
        const reloadBtn = document.getElementById('reload-btn');
        const volumeBtn = document.getElementById('volume-btn');
        const testVideoBtn = document.getElementById('test-video-btn');
        const rewardVideo = document.getElementById('reward-video');
        const closeBtn = document.getElementById('close-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let rufflePlayer = null;
        let isMuted = false;

        // 这里必须改成你实际生成的分块总数！
        const TOTAL_PARTS = 8;

        function updateProgress(percent) {
            progressBar.style.width = percent + '%';
            loadingText.textContent = `加载中... ${Math.round(percent)}%`;
        }

        async function loadGame() {
            updateProgress(0);
            loadingOverlay.style.display = 'flex';
            errorMessage.style.display = 'none';

            try {
                loadingText.textContent = '正在初始化 Ruffle 播放器...';
                await new Promise(resolve => {
                    if (window.RufflePlayer) return resolve();
                    const s = document.createElement('script');
                    s.src = 'ruffle.js';
                    s.onload = resolve;
                    document.head.appendChild(s);
                });
                updateProgress(20);

                const ruffle = window.RufflePlayer.newest();
                rufflePlayer = ruffle.createPlayer();
                gameContainer.appendChild(rufflePlayer);
                updateProgress(30);

                loadingText.textContent = '正在加载分块数据...';
                let base64 = '';

                for (let i = 1; i <= TOTAL_PARTS; i++) {
                    const resp = await fetch(`game_part_${i}.b64`);
                    if (!resp.ok) throw new Error(`game_part_${i}.b64 加载失败`);
                    const txt = await resp.text();
                    base64 += txt.trim();
                    updateProgress(30 + (i / TOTAL_PARTS) * 50);
                }

                loadingText.textContent = '正在解码游戏数据...';
                updateProgress(85);

                const bin = atob(base64);
                const u8 = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) {
                    u8[i] = bin.charCodeAt(i);
                }

                updateProgress(95);
                await rufflePlayer.load({
                    data: u8.buffer,
                    width: '100%',
                    height: '100%',
                    autoplay: 'on'
                });

                updateProgress(100);
                setTimeout(() => {
                    loadingOverlay.style.opacity = 0;
                    setTimeout(() => loadingOverlay.style.display = 'none', 500);
                }, 600);

            } catch (e) {
                console.error(e);
                errorMessage.textContent = '加载失败：' + e.message;
                errorMessage.style.display = 'block';
            }
        }

        function showRewardVideo() {
            gameContainer.style.display = 'none';
            rewardVideo.style.display = 'block';
            closeBtn.style.display = 'block';
            fullscreenBtn.style.display = 'block';
            rewardVideo.play().catch(() => rewardVideo.controls = true);
        }

        function backToGame() {
            rewardVideo.style.display = 'none';
            closeBtn.style.display = 'none';
            fullscreenBtn.style.display = 'none';
            rewardVideo.pause();
            gameContainer.style.display = 'flex';
        }

        function toggleVolume() {
            isMuted = !isMuted;
            if (rufflePlayer) rufflePlayer.muted = isMuted;
            volumeBtn.innerHTML = isMuted ? '🔇 音量' : '🔊 音量';
        }

        function toggleFullscreen() {
            if (rewardVideo.requestFullscreen) rewardVideo.requestFullscreen();
            else if (rewardVideo.webkitRequestFullscreen) rewardVideo.webkitRequestFullscreen();
        }

        reloadBtn.addEventListener('click', loadGame);
        volumeBtn.addEventListener('click', toggleVolume);
        testVideoBtn.addEventListener('click', showRewardVideo);
        closeBtn.addEventListener('click', backToGame);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        document.addEventListener('keydown', e => e.key === 'Escape' && backToGame());

        window.addEventListener('DOMContentLoaded', loadGame);
    </script>
</body>
</html>
