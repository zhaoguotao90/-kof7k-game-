<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳皇KOF7K - 阿里云OSS版</title>
    
    <!-- 使用阿里云CDN加速Ruffle -->
    <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.1.0-nightly.2024.1.20/ruffle.js"></script>
    
    <style>
        /* 原有CSS样式保持不变 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white; min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 3px solid #ffcc00; margin-bottom: 30px; }
        .title {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ffcc00, #ff9900);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        /* ...其他样式保持不变... */
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">拳皇KOF7K 阿里云OSS版</h1>
            <p class="subtitle">触碰NFC标签开始游戏</p>
        </div>
        
        <!-- 游戏容器 -->
        <div class="game-container">
            <div id="gameScreen">
                <!-- 初始加载提示 -->
            </div>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <button class="game-btn" id="loadBtn">加载游戏</button>
        </div>
    </div>
    
    <!-- 通关视频弹窗 -->
    <div id="videoModal" style="display:none;">
        <!-- 弹窗结构保持不变 -->
    </div>
    
    <script>
        // ==================== 阿里云OSS资源配置 ====================
        const OSS_BASE_URL = "https://kof7k-game.oss-cn-zhongwei.aliyuncs.com/";
        const GAME_FILE_URL = OSS_BASE_URL + "kof7k_modified.swf";
        const REWARD_VIDEO_URL = OSS_BASE_URL + "reward_video.mp4";
        
        // ==================== 游戏初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            const loadBtn = document.getElementById('loadBtn');
            loadBtn.addEventListener('click', loadGame);
            
            // 自动加载游戏（可选）
            setTimeout(loadGame, 1000);
        });
        
        // ==================== 游戏加载函数 ====================
        async function loadGame() {
            // 获取DOM元素
            const gameScreen = document.getElementById('gameScreen');
            const loadBtn = document.getElementById('loadBtn');
            
            // 更新UI状态
            loadBtn.disabled = true;
            loadBtn.textContent = '加载中...';
            
            try {
                // 创建Ruffle播放器
                gameScreen.innerHTML = '<div>正在加载游戏引擎...</div>';
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                gameScreen.appendChild(player);
                
                // 加载阿里云OSS上的游戏文件
                await player.load({
                    url: GAME_FILE_URL,
                    width: "100%",
                    height: 500
                });
                
                // 加载成功
                loadBtn.textContent = '重新加载';
                loadBtn.disabled = false;
                
                // 保存播放器实例
                window.rufflePlayer = player;
                
            } catch (error) {
                console.error('加载失败:', error);
                gameScreen.innerHTML = `
                    <div style="color:#ff6666; text-align:center; padding:40px;">
                        <h3>游戏加载失败</h3>
                        <p>${error.message}</p>
                        <button onclick="loadGame()" class="game-btn">重试</button>
                    </div>
                `;
                loadBtn.textContent = '重新加载';
                loadBtn.disabled = false;
            }
        }
        
        // ==================== 通关系统 ====================
        function handleVictory() {
            // 创建视频按钮
            const videoBtn = document.createElement('button');
            videoBtn.className = 'game-btn';
            videoBtn.style.background = 'linear-gradient(135deg, #ff3366, #cc2255)';
            videoBtn.textContent = '观看通关视频';
            videoBtn.onclick = () => {
                document.getElementById('hiddenVideo').src = REWARD_VIDEO_URL;
                document.getElementById('videoModal').style.display = 'flex';
            };
            document.querySelector('.control-panel').appendChild(videoBtn);
        }
        
        // 监听通关事件
        window.addEventListener("message", (event) => {
            if (event.data?.type === "GAME_VICTORY") handleVictory();
        });
    </script>
</body>
</html>
