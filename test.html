<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拳皇KOF7K - 修复解码版</title>
    <style>
        /* 保持您原有的所有样式不变 */
    </style>
</head>
<body>
    <!-- 保持您原有的所有HTML结构不变 -->

    <!-- 使用Ruffle官方CDN -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        // 配置常量
        const TOTAL_PARTS = 8; // 确保这个数字与您实际的分块数量一致
        const MAX_RETRIES = 3;
        
        // DOM元素获取
        const gameContainer = document.getElementById('game-container');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const progressBar = document.getElementById('progress-fill');
        const errorMessage = document.getElementById('error-message');
        const reloadBtn = document.getElementById('reload-btn');
        const networkInfo = document.getElementById('network-info');
        
        let rufflePlayer = null;
        
        // 更新进度条
        function updateProgress(percent, message = "") {
            progressBar.style.width = percent + '%';
            loadingText.textContent = message || `加载中... ${Math.round(percent)}%`;
        }
        
        // 🆕 关键修复函数：清理Base64数据
        function cleanBase64Data(base64String) {
            console.log('清理前数据长度:', base64String.length, '字符');
            console.log('前100字符:', base64String.substring(0, 100));
            
            // 1. 移除所有空白字符（换行、空格、制表符）
            let cleaned = base64String.replace(/\s/g, '');
            
            // 2. 移除可能的数据URI前缀
            cleaned = cleaned.replace(/^data:[^;]+;base64,/, '');
            
            // 3. 验证Base64字符集
            const base64Regex = /^[A-Za-z0-9+/]*={0,2}$/;
            if (!base64Regex.test(cleaned)) {
                console.warn('Base64包含非常规字符，进行过滤...');
                cleaned = cleaned.replace(/[^A-Za-z0-9+/=]/g, '');
            }
            
            // 4. 检查长度是否为4的倍数（Base64要求）
            const padding = cleaned.length % 4;
            if (padding !== 0) {
                console.warn(`Base64长度${cleaned.length}不是4的倍数，补齐${4-padding}个=`);
                cleaned += '='.repeat(4 - padding);
            }
            
            console.log('清理后数据长度:', cleaned.length, '字符');
            console.log('后100字符:', cleaned.substring(cleaned.length - 100));
            
            return cleaned;
        }
        
        // 安全的Base64解码函数
        function safeBase64Decode(base64String) {
            try {
                const cleaned = cleanBase64Data(base64String);
                
                // 验证解码
                const binary = atob(cleaned);
                const bytes = new Uint8Array(binary.length);
                
                console.log(`解码成功: ${binary.length} 字节`);
                
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                
                return bytes;
            } catch (error) {
                console.error('Base64解码失败:', error);
                
                // 🆕 尝试分块解码以定位损坏位置
                const cleaned = cleanBase64Data(base64String);
                const chunkSize = 1024 * 1024; // 1MB一块
                
                for (let i = 0; i < cleaned.length; i += chunkSize) {
                    const chunk = cleaned.substring(i, i + chunkSize);
                    try {
                        atob(chunk);
                        console.log(`块 ${i / chunkSize} 解码成功`);
                    } catch (e) {
                        throw new Error(`在位置 ${i}-${i+chunkSize} 发现损坏数据`);
                    }
                }
                
                throw error;
            }
        }
        
        // 加载单个分块（带详细日志）
        async function loadChunk(partNum) {
            const url = `game_part_${partNum}.b64?t=${Date.now()}`;
            console.log(`开始加载分块 ${partNum}: ${url}`);
            
            try {
                const startTime = Date.now();
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                }
                
                const text = await response.text();
                const endTime = Date.now();
                const duration = (endTime - startTime) / 1000;
                const sizeKB = (text.length / 1024).toFixed(2);
                const speedKB = (sizeKB / duration).toFixed(1);
                
                console.log(`分块 ${partNum} 加载成功: ${sizeKB} KB, 耗时: ${duration.toFixed(2)}s, 速度: ${speedKB} KB/s`);
                console.log(`分块 ${partNum} 前50字符: ${text.substring(0, 50)}`);
                
                return { 
                    partNum, 
                    text,
                    size: text.length
                };
            } catch (error) {
                console.error(`分块 ${partNum} 加载失败:`, error);
                throw error;
            }
        }
        
        // 主加载函数
        async function loadGame() {
            try {
                updateProgress(0, "正在初始化...");
                loadingOverlay.style.display = 'flex';
                errorMessage.style.display = 'none';
                
                // 1. 检查Ruffle
                if (!window.RufflePlayer) {
                    updateProgress(5, "正在加载Ruffle引擎...");
                    await new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = 'https://unpkg.com/@ruffle-rs/ruffle';
                        script.onload = resolve;
                        script.onerror = () => reject(new Error('Ruffle加载失败'));
                        document.head.appendChild(script);
                    });
                }
                
                // 2. 创建播放器
                updateProgress(10, "创建播放器...");
                const ruffle = window.RufflePlayer.newest();
                rufflePlayer = ruffle.createPlayer();
                rufflePlayer.style.width = '100%';
                rufflePlayer.style.height = '100%';
                gameContainer.appendChild(rufflePlayer);
                
                // 3. 分步加载并验证每个分块
                updateProgress(15, "开始加载游戏分块...");
                let allBase64Data = '';
                let totalSize = 0;
                
                for (let i = 1; i <= TOTAL_PARTS; i++) {
                    updateProgress(15 + (i-1) * 10, `加载分块 ${i}/${TOTAL_PARTS}...`);
                    
                    const result = await loadChunk(i);
                    allBase64Data += result.text;
                    totalSize += result.size;
                    
                    const percent = 15 + (i / TOTAL_PARTS) * 75;
                    updateProgress(percent, `已加载: ${(totalSize/(1024*1024)).toFixed(2)}MB`);
                    
                    if (networkInfo) {
                        networkInfo.textContent = `分块 ${i}/${TOTAL_PARTS} | ${(totalSize/(1024*1024)).toFixed(2)}MB`;
                    }
                }
                
                console.log(`所有分块加载完成，总大小: ${(totalSize/(1024*1024)).toFixed(2)}MB`);
                console.log(`Base64总字符数: ${allBase64Data.length}`);
                
                // 4. 解码前检查
                updateProgress(90, "正在解码游戏数据...");
                console.log('开始Base64解码...');
                
                const gameData = safeBase64Decode(allBase64Data);
                console.log(`解码后数据大小: ${gameData.length} 字节`);
                
                // 5. 加载游戏
                updateProgress(95, "正在启动游戏...");
                await rufflePlayer.load({
                    data: gameData.buffer,
                    width: "100%",
                    height: "100%",
                    autoplay: "on",
                    backgroundColor: "#000000"
                });
                
                // 6. 成功
                updateProgress(100, "游戏加载完成!");
                setTimeout(() => {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                        console.log('游戏启动成功！');
                    }, 500);
                }, 1000);
                
            } catch (error) {
                console.error('❌ 游戏加载失败:', error);
                
                let errorMsg = '游戏数据解码失败，文件可能已损坏';
                if (error.message.includes('atob')) {
                    errorMsg = 'Base64数据格式错误，请检查分块文件';
                } else if (error.message.includes('HTTP')) {
                    errorMsg = `分块文件下载失败: ${error.message}`;
                } else if (error.message.includes('Ruffle')) {
                    errorMsg = 'Flash播放器加载失败';
                }
                
                errorMessage.innerHTML = `
                    ${errorMsg}<br>
                    <small style="color:#ccc;">
                        错误详情: ${error.message}<br>
                        请按F12打开控制台查看详细日志
                    </small>
                `;
                errorMessage.style.display = 'block';
            }
        }
        
        // 重新加载
        reloadBtn.addEventListener('click', () => {
            if (rufflePlayer && rufflePlayer.parentNode) {
                rufflePlayer.parentNode.removeChild(rufflePlayer);
                rufflePlayer = null;
            }
            loadGame();
        });
        
        // 页面加载
        window.addEventListener('DOMContentLoaded', loadGame);
        
        // 原有其他函数（showRewardVideo、backToGame等）保持不变
        // ... [您原有的其他函数代码] ...
        
    </script>
</body>
</html>
