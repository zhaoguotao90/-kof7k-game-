<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳皇KOF7K - 优化版</title>
    
    <!-- 使用最新版Ruffle播放器 -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle@0.1.0-nightly.2024.1.20/ruffle.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 2.8em;
            background: linear-gradient(45deg, #ffcc00, #ff9900);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: #4cdfff;
            font-size: 1.4em;
            margin-bottom: 5px;
        }
        
        .status-info {
            text-align: center;
            margin: 20px 0;
            color: #ccccff;
            min-height: 24px;
        }
        
        .game-container {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #ff3333;
            box-shadow: 0 10px 30px rgba(255, 50, 50, 0.3);
        }
        
        #gameScreen {
            width: 100%;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            position: relative;
        }
        
        .control-panel {
            text-align: center;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .game-btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            min-width: 180px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .game-btn:hover {
            background: linear-gradient(135deg, #40a9ff, #096dd9);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        
        .game-btn:active {
            transform: translateY(1px);
        }
        
        .game-btn.victory {
            background: linear-gradient(135deg, #ff3366, #cc2255);
        }
        
        .mobile-controls {
            display: none;
            padding: 15px;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .controls-title {
            color: #ffcc00;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        
        .controls-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .virtual-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #ff9900, #ff6600);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            min-width: 100px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .virtual-btn:active {
            transform: scale(0.95);
        }
        
        .virtual-btn.action {
            background: linear-gradient(135deg, #ff3366, #cc2255);
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #9999ff;
        }
        
        .progress-container {
            width: 80%;
            max-width: 500px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #52c41a, #a0d911);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }
        
        .loading-text {
            text-align: center;
            color: #ccccff;
            padding: 20px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">拳皇KOF7K 优化版</h1>
            <p class="subtitle">极致流畅体验 | 移动端完美适配</p>
            <p class="subtitle">触碰NFC标签开始游戏</p>
        </div>
        
        <div class="status-info">
            <p id="loadStatus">✅ 系统就绪，点击加载游戏</p>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="loading-text" id="loadingText">
            游戏加载中，请稍候...
        </div>
        
        <div class="game-container">
            <div id="gameScreen">
                <div id="initialScreen" style="text-align: center; padding: 30px;">
                    <div style="font-size: 4em; margin-bottom: 20px; color: #ffcc00;">🥊</div>
                    <h2 style="font-size: 2em; margin-bottom: 15px; color: #ff9900;">拳皇KOF7K 格斗传承</h2>
                    <p style="margin-top: 20px; font-size: 1.2em; color: #4cdfff;">光效华丽升级 | 新角色-卢卡尔 | 部分人物Bug修正</p>
                </div>
            </div>
        </div>
        
        <div class="control-panel">
            <button class="game-btn" id="loadBtn">加载游戏</button>
            <button class="game-btn" id="testBtn" style="background: linear-gradient(135deg, #52c41a, #389e0d);">测试通关</button>
        </div>
        
        <div class="mobile-controls" id="mobileControls">
            <p class="controls-title">手机用户请使用虚拟按键：</p>
            <div class="controls-row">
                <button class="virtual-btn" onclick="simulateKey('ArrowUp')">↑ 上</button>
                <button class="virtual-btn" onclick="simulateKey('ArrowDown')">↓ 下</button>
                <button class="virtual-btn" onclick="simulateKey('ArrowLeft')">← 左</button>
                <button class="virtual-btn" onclick="simulateKey('ArrowRight')">→ 右</button>
            </div>
            <div class="controls-row">
                <button class="virtual-btn action" onclick="simulateKey('KeyA')">A 轻拳</button>
                <button class="virtual-btn action" onclick="simulateKey('KeyB')">B 重拳</button>
                <button class="virtual-btn action" onclick="simulateKey('KeyC')">C 轻脚</button>
                <button class="virtual-btn action" onclick="simulateKey('KeyD')">D 重脚</button>
            </div>
            <div class="controls-row">
                <button class="virtual-btn" onclick="simulateKey('Enter')">开始/确定</button>
                <button class="virtual-btn" onclick="simulateKey('Escape')">退出</button>
            </div>
        </div>
        
        <div class="footer">
            <p>闪翼拳皇 1.91 - 格斗传承 | 使用Ruffle播放器加载Flash游戏</p>
            <p style="margin-top: 10px; font-size: 0.9em; color: #7777ff;">优化版 | 解决卡顿与触摸问题</p>
        </div>
    </div>
    
    <!-- 通关视频弹窗 -->
    <div id="videoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#111; padding:20px; border-radius:10px; max-width:800px; width:90%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="color:#ffcc00;">🎁 通关奖励 - 隐藏彩蛋视频</h3>
                <button onclick="closeVideo()" style="background:#ff3333; color:white; border:none; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:1.2em;">×</button>
            </div>
            <video id="hiddenVideo" controls style="width:100%; border-radius:5px;">
                <source src="https://kof7k-game.oss-cn-zhongwei.aliyuncs.com/reward_video.mp4" type="video/mp4">
                您的浏览器不支持视频播放
            </video>
        </div>
    </div>
    
    <script>
        // ==================== 全局变量 ====================
        let rufflePlayer = null;
        let isGameLoaded = false;
        let isVictory = false;
        
        // 使用阿里云OSS传输加速域名（需先在控制台开启）
        const OSS_BASE_URL = "https://kof7k-game.oss-accelerate.aliyuncs.com/";
        const GAME_FILE_URL = OSS_BASE_URL + "kof7k_modified.swf";
        const REWARD_VIDEO_URL = OSS_BASE_URL + "reward_video.mp4";
        
        // ==================== 页面初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            const loadBtn = document.getElementById('loadBtn');
            const testBtn = document.getElementById('testBtn');
            
            loadBtn.addEventListener('click', loadGame);
            testBtn.addEventListener('click', testVictory);
            
            // 设置视频源
            document.getElementById('hiddenVideo').querySelector('source').src = REWARD_VIDEO_URL;
            
            // 检测移动设备并显示虚拟按键
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                document.getElementById('mobileControls').style.display = 'block';
            }
        });
        
        // ==================== 游戏加载函数 ====================
        async function loadGame() {
            const gameScreen = document.getElementById('gameScreen');
            const loadBtn = document.getElementById('loadBtn');
            const loadStatus = document.getElementById('loadStatus');
            const progressBar = document.getElementById('progressBar');
            const loadingText = document.getElementById('loadingText');
            const initialScreen = document.getElementById('initialScreen');
            
            loadBtn.disabled = true;
            loadBtn.textContent = '加载中...';
            loadStatus.textContent = '正在加载游戏...';
            initialScreen.style.display = 'none';
            
            // 显示加载进度
            loadingText.textContent = '正在加载游戏资源...';
            progressBar.style.width = '10%';
            
            try {
                // 检查Ruffle播放器
                if (!window.RufflePlayer || !window.RufflePlayer.newest) {
                    throw new Error('Ruffle播放器未加载');
                }
                
                // 创建游戏容器
                gameScreen.innerHTML = '<div style="color:#ccccff; text-align:center; padding:50px;">游戏加载中，请稍候...</div>';
                
                // 创建Ruffle播放器实例
                const ruffle = window.RufflePlayer.newest();
                rufflePlayer = ruffle.createPlayer();
                gameScreen.innerHTML = '';
                gameScreen.appendChild(rufflePlayer);
                
                // 更新进度
                progressBar.style.width = '30%';
                loadingText.textContent = '初始化游戏引擎...';
                
                // 配置Ruffle播放器
                rufflePlayer.config = {
                    wgpuPowerPreference: "high-performance",
                    autoplay: "on",
                    unmuteOverlay: "hidden",
                    openInNewTab: false,
                    backgroundColor: "#000000",
                    letterbox: "fullscreen",
                    preferredRenderer: "webgpu",
                    logLevel: "error"
                };
                
                // 更新进度
                progressBar.style.width = '50%';
                loadingText.textContent = '加载游戏文件...';
                
                // 加载游戏文件
                await rufflePlayer.load({
                    url: GAME_FILE_URL,
                    width: "100%",
                    height: "100%"
                });
                
                // 更新进度
                progressBar.style.width = '80%';
                loadingText.textContent = '优化游戏性能...';
                
                // 添加性能优化
                setTimeout(() => {
                    // 优化帧率
                    if (rufflePlayer && rufflePlayer.setFrameRate) {
                        rufflePlayer.setFrameRate(60);
                    }
                    
                    // 优化渲染
                    if (rufflePlayer && rufflePlayer.setQuality) {
                        rufflePlayer.setQuality("high");
                    }
                    
                    // 更新进度
                    progressBar.style.width = '100%';
                    loadingText.textContent = '游戏加载完成！';
                    
                    // 加载成功
                    setTimeout(() => {
                        loadStatus.textContent = '✅ 游戏加载成功！请开始游戏';
                        loadBtn.textContent = '重新加载游戏';
                        loadBtn.disabled = false;
                        isGameLoaded = true;
                        loadingText.style.display = 'none';
                        progressBar.style.display = 'none';
                    }, 500);
                }, 1000);
                
            } catch (error) {
                console.error('加载失败:', error);
                loadStatus.textContent = '❌ 游戏加载失败: ' + error.message;
                loadBtn.textContent = '重新加载';
                loadBtn.disabled = false;
                loadingText.textContent = '加载失败，请重试';
                progressBar.style.width = '0%';
                
                gameScreen.innerHTML = `
                    <div style="color:#ff6666; text-align:center; padding:40px;">
                        <div style="font-size:3em; margin-bottom:15px;">❌</div>
                        <h3>游戏加载失败</h3>
                        <p>${error.message}</p>
                        <button onclick="loadGame()" class="game-btn" style="margin-top:20px;">
                            重新加载
                        </button>
                    </div>
                `;
            }
        }
        
        // ==================== 虚拟按键系统 ====================
        function simulateKey(key) {
            if (!rufflePlayer) return;
            
            // 创建键盘事件
            const keyDownEvent = new KeyboardEvent('keydown', { key: key });
            const keyUpEvent = new KeyboardEvent('keyup', { key: key });
            
            // 发送事件到游戏
            rufflePlayer.dispatchEvent(keyDownEvent);
            setTimeout(() => {
                rufflePlayer.dispatchEvent(keyUpEvent);
            }, 100);
        }
        
        // ==================== 通关系统 ====================
        function testVictory() {
            if (!isGameLoaded) return;
            
            // 模拟通关逻辑
            document.getElementById('loadStatus').textContent = '🎉 恭喜通关！点击下方按钮观看隐藏视频';
            
            // 创建视频按钮
            const videoBtn = document.createElement('button');
            videoBtn.className = 'game-btn victory';
            videoBtn.textContent = '观看通关视频';
            videoBtn.onclick = showVideo;
            
            document.querySelector('.control-panel').appendChild(videoBtn);
            isVictory = true;
        }
        
        function showVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('hiddenVideo');
            
            modal.style.display = 'flex';
            video.play().catch(e => {
                console.log('视频播放失败:', e);
                alert('视频播放失败，请确保视频文件存在');
            });
        }
        
        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('hiddenVideo');
            
            video.pause();
            video.currentTime = 0;
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
