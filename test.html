<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳皇KOF7K - NFC通关挑战</title>
    
    <!-- 国内CDN加速 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/ruffle/0.1.0/ruffle.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a4a, #0a0a2a);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* NFC提示条 */
        .nfc-banner {
            background: linear-gradient(to right, #1890ff, #096dd9);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.1em;
            border-radius: 0 0 10px 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 105, 255, 0.3);
        }
        
        .nfc-banner span {
            font-size: 1.3em;
            margin-right: 10px;
        }
        
        /* 游戏容器 */
        .game-container {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }
        
        #gameScreen {
            width: 100%;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }
        
        /* 控制面板 */
        .control-panel {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #3366ff;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3366ff, #2244cc);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
            cursor: pointer;
            text-align: center;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #4477ff, #3355dd);
        }
        
        /* 通关提示 */
        .victory-message {
            display: none;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            border: 2px solid #ffcc00;
        }
        
        .victory-title {
            font-size: 2.5em;
            color: #ffcc00;
            margin-bottom: 20px;
        }
        
        .video-btn {
            background: linear-gradient(135deg, #ff3366, #cc2255);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }
        
        /* 视频播放器 */
        #videoPlayer {
            display: none;
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #33cc66;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #9999ff;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- NFC提示条 -->
        <div class="nfc-banner">
            <span>📱</span> 已通过NFC标签进入游戏 - 挑战通关解锁隐藏视频
        </div>
        
        <!-- 游戏容器 -->
        <div class="game-container">
            <div id="gameScreen">
                <div id="loadingText" style="text-align: center; color: #ccccff; padding: 30px;">
                    <div style="font-size: 3em; margin-bottom: 20px;">🎮</div>
                    <h2>拳皇KOF7K 通关挑战</h2>
                    <p style="margin-top: 20px;">触碰NFC标签开始游戏</p>
                    <button class="btn" onclick="loadGame()" style="margin-top: 30px;">
                        加载游戏
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <button class="btn" onclick="testVictory()">
                模拟通关（测试用）
            </button>
        </div>
        
        <!-- 通关提示 -->
        <div id="victoryMessage" class="victory-message">
            <h2 class="victory-title">🎉 恭喜通关！</h2>
            <p style="font-size: 1.2em; margin-bottom: 20px;">
                您已成功击败所有对手，解锁隐藏彩蛋视频！
            </p>
            <button class="video-btn" onclick="showVideo()">
                观看通关视频
            </button>
        </div>
        
        <!-- 视频播放器 -->
        <div id="videoPlayer">
            <video controls style="width:100%;">
                <source src="reward_video.mp4" type="video/mp4">
                您的浏览器不支持视频播放
            </video>
        </div>
        
        <!-- 页脚 -->
        <div class="footer">
            <p>拳皇KOF7K - NFC通关挑战系统 | 使用Ruffle播放器</p>
            <p style="margin-top: 10px;">提示：通关后视频将自动解锁</p>
        </div>
    </div>
    
    <script>
        // ==================== 核心功能 ====================
        let rufflePlayer = null;
        let isGameLoaded = false;
        let isVictoryAchieved = false;
        
        // 加载游戏
        async function loadGame() {
            const gameScreen = document.getElementById('gameScreen');
            gameScreen.innerHTML = '<div style="color:#ccccff; text-align:center; padding:50px;"><div style="font-size:3em; margin-bottom:20px;">⏳</div>游戏加载中，请稍候...</div>';
            
            try {
                // 使用国内CDN加载游戏
                const gameUrl = "https://cdn.jsdelivr.net/gh/赵国涛90/-kof7k-游戏-@main/kof7k_modified.swf";
                
                // 配置Ruffle
                window.RufflePlayer = window.RufflePlayer || {};
                window.RufflePlayer.config = {
                    "autoplay": "on",
                    "unmuteOverlay": "hidden",
                    "backgroundColor": "#000000"
                };
                
                const ruffle = window.RufflePlayer.newest();
                rufflePlayer = ruffle.createPlayer();
                gameScreen.innerHTML = '';
                gameScreen.appendChild(rufflePlayer);
                
                await rufflePlayer.load({
                    url: gameUrl,
                    width: "100%",
                    height: 500
                });
                
                isGameLoaded = true;
                document.getElementById('loadingText').style.display = 'none';
                
                // 监听通关信号
                setupVictoryListener();
                
            } catch (error) {
                gameScreen.innerHTML = `
                    <div style="color:#ff6666; text-align:center; padding:50px;">
                        <div style="font-size:3em; margin-bottom:20px;">❌</div>
                        <h3>游戏加载失败</h3>
                        <p>${error.message}</p>
                        <button onclick="loadGame()" style="
                            padding: 10px 20px;
                            background: #3366ff;
                            color: white;
                            border: none;
                            border-radius: 5px;
                            margin-top: 20px;
                        ">重新加载</button>
                    </div>
                `;
            }
        }
        
        // 设置通关监听
        function setupVictoryListener() {
            // 方法1：监听消息事件
            window.addEventListener("message", (event) => {
                if (event.data && event.data.type === "GAME_VICTORY") {
                    handleVictory();
                }
            });
            
            // 方法2：设置回调函数
            window.onGameVictory = function() {
                handleVictory();
            };
        }
        
        // 处理通关
        function handleVictory() {
            if (isVictoryAchieved) return;
            
            isVictoryAchieved = true;
            document.getElementById('victoryMessage').style.display = 'block';
            
            // 保存通关状态
            localStorage.setItem('kof7k_victory', 'achieved');
        }
        
        // 显示视频
        function showVideo() {
            document.getElementById('videoPlayer').style.display = 'block';
            document.querySelector('#videoPlayer video').play();
        }
        
        // 测试通关
        function testVictory() {
            handleVictory();
        }
        
        // ==================== NFC功能 ====================
        // 检查是否来自NFC
        function checkNFCReferrer() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('nfc')) {
                document.querySelector('.nfc-banner').style.display = 'block';
            }
        }
        
        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', () => {
            // 检查是否来自NFC
            checkNFCReferrer();
            
            // 检查是否已通关
            if (localStorage.getItem('kof7k_victory') === 'achieved') {
                document.getElementById('victoryMessage').style.display = 'block';
            }
            
            // 自动加载游戏（可选）
            // setTimeout(loadGame, 1000);
        });
    </script>
</body>
</html>
