<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳皇KOF7K - 大文件优化版</title>
    
    <!-- 使用可靠的Ruffle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.1.0-nightly.2024.1.20/ruffle.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ffcc00, #ff9900);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #4cdfff;
            font-size: 1.3em;
        }
        
        /* 游戏容器 */
        .game-container {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #ff3333;
        }
        
        #gameScreen {
            width: 100%;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }
        
        /* 控制面板 */
        .control-panel {
            text-align: center;
            margin: 20px 0;
        }
        
        .game-btn {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin: 8px;
            min-width: 180px;
        }
        
        .game-btn:hover {
            background: linear-gradient(135deg, #40a9ff, #096dd9);
        }
        
        .game-btn.test {
            background: linear-gradient(135deg, #52c41a, #389e0d);
        }
        
        .game-btn.test:hover {
            background: linear-gradient(135deg, #73d13d, #52c41a);
        }
        
        /* 状态信息 */
        .status-info {
            text-align: center;
            margin: 20px 0;
            color: #ccccff;
            min-height: 24px;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #9999ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1 class="title">拳皇KOF7K 大文件优化版</h1>
            <p class="subtitle">无需上传到GitHub，使用外部直链</p>
        </div>
        
        <!-- 状态信息 -->
        <div class="status-info">
            <p id="loadStatus">✅ 系统就绪，点击下方按钮开始游戏</p>
        </div>
        
        <!-- 游戏容器 -->
        <div class="game-container">
            <div id="gameScreen">
                <div id="loadingText" style="text-align: center; color: #ccccff; padding: 20px;">
                    <div style="font-size: 3em; margin-bottom: 15px;">🎮</div>
                    <h2>拳皇KOF7K 格斗传承</h2>
                    <p style="margin-top: 15px;">大文件优化版 | 35MB SWF文件 | 无需上传GitHub</p>
                </div>
            </div>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <button class="game-btn" id="loadBtn">加载游戏</button>
            <button class="game-btn test" id="testBtn">测试通关</button>
        </div>
        
        <!-- 页脚 -->
        <div class="footer">
            <p>闪翼拳皇 1.91 - 格斗传承 | 大文件优化方案</p>
            <p style="margin-top: 8px;">提示：使用外部直链加载35MB游戏文件</p>
        </div>
    </div>
    
    <!-- 通关视频弹窗 -->
    <div id="videoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#111; padding:20px; border-radius:10px; max-width:800px; width:90%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="color:#ffcc00;">🎁 通关奖励 - 隐藏彩蛋视频</h3>
                <button onclick="closeVideo()" style="background:#ff3333; color:white; border:none; width:30px; height:30px; border-radius:50%; cursor:pointer;">×</button>
            </div>
            <video id="hiddenVideo" controls style="width:100%; border-radius:5px;">
                <source src="reward_video.mp4" type="video/mp4">
                您的浏览器不支持视频播放
            </video>
        </div>
    </div>
    
    <script>
        // ==================== 大文件加载方案 ====================
        // 使用外部直链加载大文件
        const BIG_FILE_URL = "https://file.wd02.com/dl/5b320d25d4c1f9faab3ec77f3603ddf2.swf";
        
        // ==================== 页面加载初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面已加载，开始初始化按钮事件...');
            
            // 获取按钮元素
            const loadBtn = document.getElementById('loadBtn');
            const testBtn = document.getElementById('testBtn');
            
            // 为加载游戏按钮添加事件监听
            loadBtn.addEventListener('click', function() {
                console.log('"加载游戏"按钮被点击');
                document.getElementById('loadStatus').textContent = '正在加载游戏...';
                loadGame();
            });
            
            // 为测试通关按钮添加事件监听
            testBtn.addEventListener('click', function() {
                console.log('"测试通关"按钮被点击');
                document.getElementById('loadStatus').textContent = '测试通关功能...';
                testVictory();
            });
            
            console.log('按钮事件绑定完成');
            
            // 检查是否已通关
            if (localStorage.getItem('kof_victory') === 'true') {
                console.log('检测到之前的通关状态');
                handleVictory();
            }
        });
        
        // ==================== 游戏加载函数 ====================
        async function loadGame() {
            console.log('开始加载游戏...');
            
            const gameScreen = document.getElementById('gameScreen');
            const loadBtn = document.getElementById('loadBtn');
            const loadStatus = document.getElementById('loadStatus');
            
            // 更新按钮状态
            loadBtn.disabled = true;
            loadBtn.textContent = '加载中...';
            
            try {
                // 1. 检查Ruffle播放器
                console.log('检查Ruffle播放器状态...');
                
                if (!window.RufflePlayer) {
                    throw new Error('RufflePlayer对象不存在');
                }
                
                if (!window.RufflePlayer.newest) {
                    throw new Error('RufflePlayer.newest函数不存在');
                }
                
                console.log('Ruffle播放器检查通过');
                loadStatus.textContent = 'Ruffle加载成功，正在加载游戏...';
                
                // 2. 创建游戏容器
                gameScreen.innerHTML = `
                    <div style="color:#ccccff; text-align:center; padding:40px;">
                        <div style="font-size:2em; margin-bottom:20px;">⏳</div>
                        <h3>正在加载拳皇KOF7K</h3>
                        <p>文件大小: 35MB，请耐心等待...</p>
                        <div style="margin-top:20px; padding:10px; background:rgba(255,255,255,0.1); border-radius:5px;">
                            <div id="progressBar" style="height:4px; background:#1890ff; width:0%; transition:width 0.3s;"></div>
                        </div>
                    </div>
                `;
                
                // 3. 创建Ruffle播放器实例
                console.log('创建Ruffle播放器实例...');
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                gameScreen.innerHTML = '';
                gameScreen.appendChild(player);
                
                // 4. 加载游戏文件
                console.log('开始加载游戏文件...');
                console.log('使用外部直链:', BIG_FILE_URL);
                
                // 模拟进度条
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += 1;
                    const progressBar = document.getElementById('progressBar');
                    if (progressBar) {
                        progressBar.style.width = Math.min(progress, 90) + '%';
                    }
                }, 500);
                
                // 5. 加载游戏（设置超时）
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('加载超时（60秒）')), 60000)
                );
                
                const loadPromise = player.load({
                    url: BIG_FILE_URL,
                    width: "100%",
                    height: 450
                });
                
                await Promise.race([loadPromise, timeoutPromise]);
                
                // 6. 加载成功
                clearInterval(progressInterval);
                loadStatus.textContent = '✅ 游戏加载成功！请开始游戏。';
                loadBtn.textContent = '重新加载游戏';
                loadBtn.disabled = false;
                
                // 保存播放器实例
                window.rufflePlayer = player;
                
                // 设置通关监听
                setupVictoryListener();
                
            } catch (error) {
                console.error('加载失败:', error);
                loadStatus.textContent = '❌ 游戏加载失败: ' + error.message;
                loadBtn.textContent = '重新加载';
                loadBtn.disabled = false;
                
                // 显示详细错误信息和解决方案
                gameScreen.innerHTML = `
                    <div style="color:#ff6666; text-align:center; padding:40px;">
                        <div style="font-size:3em; margin-bottom:15px;">❌</div>
                        <h3>游戏加载失败</h3>
                        <p>${error.message}</p>
                        
                        <div style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.1); border-radius:8px; text-align:left;">
                            <h4 style="color:#ffcc00;">解决方案：</h4>
                            <ul style="margin-top:10px; padding-left:20px;">
                                <li>请确保您有稳定的网络连接</li>
                                <li>尝试使用手机热点代替WiFi</li>
                                <li>避开网络高峰时段</li>
                                <li>文件较大(35MB)，请耐心等待</li>
                            </ul>
                        </div>
                        
                        <div style="margin-top:20px;">
                            <button onclick="loadGame()" style="
                                padding: 10px 20px;
                                background: #3366ff;
                                color: white;
                                border: none;
                                border-radius: 5px;
                                margin: 5px;
                            ">重新加载</button>
                            
                            <button onclick="tryAlternativeLoad()" style="
                                padding: 10px 20px;
                                background: #ff6600;
                                color: white;
                                border: none;
                                border-radius: 5px;
                                margin: 5px;
                            ">尝试备选方案</button>
                        </div>
                    </div>
                `;
            }
        }
        
        // ==================== 备选加载方案 ====================
        async function tryAlternativeLoad() {
            console.log('尝试备选加载方案...');
            const loadStatus = document.getElementById('loadStatus');
            loadStatus.textContent = '正在尝试备选加载方案...';
            
            // 尝试使用不同的CDN代理
            const alternativeUrls = [
                "https://api.allorigins.win/raw?url=" + encodeURIComponent(BIG_FILE_URL),
                "https://corsproxy.io/?" + encodeURIComponent(BIG_FILE_URL),
                "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(BIG_FILE_URL)
            ];
            
            for (let i = 0; i < alternativeUrls.length; i++) {
                try {
                    console.log(`尝试备选方案 ${i+1}: ${alternativeUrls[i]}`);
                    loadStatus.textContent = `尝试备选方案 ${i+1}/3...`;
                    
                    const ruffle = window.RufflePlayer.newest();
                    const player = ruffle.createPlayer();
                    document.getElementById('gameScreen').innerHTML = '';
                    document.getElementById('gameScreen').appendChild(player);
                    
                    await player.load({
                        url: alternativeUrls[i],
                        width: "100%",
                        height: 450
                    });
                    
                    loadStatus.textContent = '✅ 备选方案加载成功！';
                    window.rufflePlayer = player;
                    setupVictoryListener();
                    return;
                    
                } catch (error) {
                    console.log(`备选方案 ${i+1} 失败:`, error.message);
                }
            }
            
            loadStatus.textContent = '❌ 所有备选方案都失败了';
        }
        
        // ==================== 通关系统 ====================
        function setupVictoryListener() {
            console.log('设置通关监听器...');
            
            window.addEventListener("message", (event) => {
                if (event.data && event.data.type === "GAME_VICTORY") {
                    handleVictory();
                }
            });
        }
        
        function handleVictory() {
            if (window.hasVictory) return;
            
            window.hasVictory = true;
            document.getElementById('loadStatus').textContent = '🎉 恭喜通关！可以观看隐藏视频了';
            
            // 创建视频按钮
            const videoBtn = document.createElement('button');
            videoBtn.className = 'game-btn';
            videoBtn.style.background = 'linear-gradient(135deg, #ff3366, #cc2255)';
            videoBtn.textContent = '观看通关视频';
            videoBtn.onclick = showVideo;
            
            document.querySelector('.control-panel').appendChild(videoBtn);
            
            // 保存通关状态
            localStorage.setItem('kof_victory', 'true');
        }
        
        function showVideo() {
            console.log('显示通关视频');
            const videoModal = document.getElementById('videoModal');
            const video = document.getElementById('hiddenVideo');
            
            videoModal.style.display = 'flex';
            video.play().catch(e => {
                console.error('视频播放失败:', e);
                alert('视频播放失败，请确保视频文件存在');
            });
        }
        
        function closeVideo() {
            const videoModal = document.getElementById('videoModal');
            const video = document.getElementById('hiddenVideo');
            
            video.pause();
            video.currentTime = 0;
            videoModal.style.display = 'none';
        }
        
        function testVictory() {
            console.log('测试通关功能');
            handleVictory();
        }
    </script>
</body>
</html>
