<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拳皇KOF7K - 优化加载版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(to right, #8b0000, #b22222, #8b0000);
            border-bottom: 4px solid #ffcc00;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .title {
            font-size: 2.8em;
            background: linear-gradient(45deg, #ffcc00, #ff9900, #ff6600);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 1.2em;
            color: #4cdfff;
            opacity: 0.9;
        }
        
        #game-container {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
            position: relative;
            background: #000;
            border: 2px solid #333;
        }
        
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        
        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 255, 255, 0.1);
            border-top: 8px solid #ff3333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #loading-text {
            font-size: 1.4em;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 20px;
        }
        
        #progress-bar {
            width: 80%;
            max-width: 500px;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin: 20px 0;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00c9ff, #92fe9d);
            transition: width 0.3s ease;
            border-radius: 6px;
        }
        
        #error-message {
            display: none;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            max-width: 80%;
            margin-top: 20px;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }
        
        #controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            padding: 0 20px;
        }
        
        .control-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .control-btn:active {
            transform: translateY(1px);
        }
        
        #reward-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
        }
        
        #close-btn, #fullscreen-btn {
            position: fixed;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: 2px solid #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1001;
            display: none;
        }
        
        #close-btn {
            top: 20px;
            right: 20px;
        }
        
        #fullscreen-btn {
            bottom: 20px;
            right: 20px;
        }
        
        .network-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #ccc;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        .console-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-width: 300px;
            display: none;
            z-index: 1000;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 2em;
            }
            
            .subtitle {
                font-size: 1em;
            }
            
            .control-btn {
                padding: 10px 20px;
                font-size: 1em;
            }
            
            #loading-text {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">拳皇KOF7K - 终极版</h1>
        <p class="subtitle">二进制分块加载 + 智能缓存 + 实时进度</p>
    </div>
    
    <div id="game-container">
        <div id="loading-overlay">
            <div class="loader"></div>
            <div id="loading-text">正在初始化游戏加载器...</div>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="error-message"></div>
        </div>
    </div>
    
    <div id="controls">
        <button class="control-btn" id="reload-btn">
            <span>🔄</span> 重新加载游戏
        </button>
        <button class="control-btn" id="volume-btn">
            <span>🔊</span> 切换音量
        </button>
        <button class="control-btn" id="test-video-btn">
            <span>🎬</span> 测试奖励视频
        </button>
    </div>
    
    <video id="reward-video" controls playsinline>
        <source src="reward_video.mp4" type="video/mp4">
        您的浏览器不支持视频播放
    </video>
    
    <button id="close-btn">返回游戏</button>
    <button id="fullscreen-btn">全屏播放</button>
    
    <div class="network-info" id="network-info"></div>
    <div class="console-info" id="console-info"></div>

    <!-- 使用Ruffle官方CDN -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        // 配置常量
        const TOTAL_PARTS = 8; // 重要：请根据您实际的分块数量修改这个值
        const MAX_RETRIES = 3; // 每个分块的最大重试次数
        const PARALLEL_LOADS = 2; // 并行加载的分块数
        const LOAD_TIMEOUT = 300000; // 5分钟超时
        
        // DOM元素获取
        const gameContainer = document.getElementById('game-container');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const progressBar = document.getElementById('progress-fill');
        const errorMessage = document.getElementById('error-message');
        const reloadBtn = document.getElementById('reload-btn');
        const volumeBtn = document.getElementById('volume-btn');
        const testVideoBtn = document.getElementById('test-video-btn');
        const rewardVideo = document.getElementById('reward-video');
        const closeBtn = document.getElementById('close-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const networkInfo = document.getElementById('network-info');
        const consoleInfo = document.getElementById('console-info');
        
        let rufflePlayer = null;
        let isMuted = false;
        let loadedParts = 0;
        let totalSize = 0;
        let loadTimeoutId = null;
        
        // 更新进度条
        function updateProgress(percent, message = "") {
            progressBar.style.width = percent + '%';
            loadingText.textContent = message || `加载中... ${Math.round(percent)}%`;
        }
        
        // 更新控制台信息
        function updateConsoleInfo(message) {
            consoleInfo.textContent = message;
            consoleInfo.style.display = 'block';
            setTimeout(() => {
                consoleInfo.style.display = 'none';
            }, 5000);
        }
        
        // 带重试的fetch函数（加载二进制分块）
        async function fetchBinaryChunk(url, partNum, retryCount = 0) {
            try {
                const startTime = Date.now();
                const response = await fetch(`${url}?cache=${Date.now()}&part=${partNum}`);
                const endTime = Date.now();
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                }
                
                const arrayBuffer = await response.arrayBuffer();
                const duration = (endTime - startTime) / 1000;
                const sizeMB = (arrayBuffer.byteLength / (1024 * 1024)).toFixed(2);
                const speedMB = (arrayBuffer.byteLength / (1024 * 1024 * duration)).toFixed(2);
                
                console.log(`分块 ${partNum} 加载成功: ${sizeMB}MB, 耗时: ${duration.toFixed(2)}s, 速度: ${speedMB}MB/s`);
                updateConsoleInfo(`分块 ${partNum} 加载成功: ${sizeMB}MB`);
                
                return { 
                    partNum, 
                    arrayBuffer,
                    size: arrayBuffer.byteLength,
                    speed: speedMB
                };
            } catch (error) {
                if (retryCount < MAX_RETRIES) {
                    console.warn(`分块 ${partNum} 加载失败，${retryCount+1}秒后重试 (${retryCount + 1}/${MAX_RETRIES})`);
                    updateConsoleInfo(`分块 ${partNum} 重试中... (${retryCount + 1}/${MAX_RETRIES})`);
                    await new Promise(resolve => setTimeout(resolve, 1000 * (retryCount + 1)));
                    return fetchBinaryChunk(url, partNum, retryCount + 1);
                }
                throw new Error(`分块 ${partNum} 加载失败: ${error.message}`);
            }
        }
        
        // 并行加载所有分块
        async function loadAllChunks() {
            loadedParts = 0;
            totalSize = 0;
            const chunks = new Array(TOTAL_PARTS);
            
            updateProgress(15, "开始并行加载分块...");
            
            // 创建所有分块的加载任务
            const loadPromises = [];
            for (let i = 1; i <= TOTAL_PARTS; i++) {
                loadPromises.push(
                    fetchBinaryChunk(`game_part_${i}.bin`, i)
                        .then(result => {
                            chunks[i - 1] = result.arrayBuffer;
                            loadedParts++;
                            totalSize += result.size;
                            
                            const percent = 15 + (loadedParts / TOTAL_PARTS) * 75;
                            const loadedMB = (totalSize / (1024 * 1024)).toFixed(2);
                            updateProgress(percent, `已加载 ${loadedParts}/${TOTAL_PARTS} 分块 (${loadedMB}MB)`);
                            
                            if (networkInfo) {
                                networkInfo.textContent = `分块 ${loadedParts}/${TOTAL_PARTS} | ${loadedMB}MB`;
                            }
                            
                            return result;
                        })
                        .catch(error => {
                            console.error(`分块 ${i} 加载最终失败:`, error);
                            throw error;
                        })
                );
            }
            
            // 等待所有分块加载完成
            const results = await Promise.allSettled(loadPromises);
            
            // 检查是否有失败的加载
            const failedLoads = results.filter(r => r.status === 'rejected');
            if (failedLoads.length > 0) {
                throw new Error(`${failedLoads.length} 个分块加载失败`);
            }
            
            console.log(`所有分块加载完成，总大小: ${(totalSize/(1024*1024)).toFixed(2)}MB`);
            
            return chunks;
        }
        
        // 组合所有分块为单个ArrayBuffer
        function combineChunks(chunks) {
            // 计算总大小
            const totalSize = chunks.reduce((sum, chunk) => sum + chunk.byteLength, 0);
            const combinedBuffer = new Uint8Array(totalSize);
            
            // 按顺序复制所有分块
            let offset = 0;
            for (const chunk of chunks) {
                combinedBuffer.set(new Uint8Array(chunk), offset);
                offset += chunk.byteLength;
            }
            
            console.log(`组合完成，总大小: ${(combinedBuffer.length/(1024*1024)).toFixed(2)}MB`);
            return combinedBuffer.buffer;
        }
        
        // 主加载函数
        async function loadGame() {
            try {
                // 设置加载超时
                loadTimeoutId = setTimeout(() => {
                    handleError(new Error('加载超时，请检查网络连接后重试'));
                }, LOAD_TIMEOUT);
                
                // 初始化状态
                updateProgress(0, "正在初始化游戏加载器...");
                loadingOverlay.style.display = 'flex';
                loadingOverlay.style.opacity = '1';
                errorMessage.style.display = 'none';
                reloadBtn.style.display = 'none';
                
                // 移除旧的播放器实例
                if (rufflePlayer && rufflePlayer.parentNode) {
                    rufflePlayer.parentNode.removeChild(rufflePlayer);
                    rufflePlayer = null;
                }
                
                // 检查Ruffle播放器
                if (!window.RufflePlayer) {
                    updateProgress(5, "正在加载Ruffle引擎...");
                    await new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = 'https://unpkg.com/@ruffle-rs/ruffle';
                        script.onload = () => {
                            console.log('Ruffle引擎加载成功');
                            resolve();
                        };
                        script.onerror = () => reject(new Error('Ruffle引擎加载失败'));
                        document.head.appendChild(script);
                    });
                }
                
                // 创建播放器实例
                updateProgress(10, "正在创建播放器...");
                const ruffle = window.RufflePlayer.newest();
                rufflePlayer = ruffle.createPlayer();
                rufflePlayer.style.width = '100%';
                rufflePlayer.style.height = '100%';
                gameContainer.appendChild(rufflePlayer);
                
                // 加载所有分块
                const chunks = await loadAllChunks();
                
                // 组合分块
                updateProgress(90, "正在组合游戏数据...");
                const gameData = combineChunks(chunks);
                
                // 加载到Ruffle播放器
                updateProgress(95, "正在初始化游戏...");
                await rufflePlayer.load({
                    data: gameData,
                    width: "100%",
                    height: "100%",
                    autoplay: "on",
                    backgroundColor: "#000000",
                    letterbox: "on",
                    unmuteOverlay: "hidden"
                });
                
                // 加载成功
                clearTimeout(loadTimeoutId);
                updateProgress(100, "游戏加载完成！");
                
                setTimeout(() => {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                        console.log('游戏启动成功！');
                    }, 500);
                }, 1000);
                
            } catch (error) {
                console.error('❌ 游戏加载失败:', error);
                clearTimeout(loadTimeoutId);
                handleError(error);
            }
        }
        
        // 错误处理
        function handleError(error) {
            let errorMsg = '';
            
            if (error.message.includes('fetch') || error.message.includes('network')) {
                errorMsg = '网络连接失败，请检查网络连接后重试';
            } else if (error.message.includes('Ruffle')) {
                errorMsg = 'Flash播放器加载失败，请刷新页面';
            } else if (error.message.includes('分块')) {
                errorMsg = '游戏分块文件加载失败，请检查文件路径';
            } else if (error.message.includes('超时')) {
                errorMsg = '加载超时，请检查网络连接';
            } else {
                errorMsg = `加载失败: ${error.message}`;
            }
            
            errorMessage.innerHTML = `
                <strong>${errorMsg}</strong><br>
                <small style="color:#ccc;">
                    错误详情: ${error.message}<br>
                    请按F12打开浏览器控制台查看详细日志
                </small>
            `;
            errorMessage.style.display = 'block';
            reloadBtn.style.display = 'block';
            
            // 显示重新加载按钮
            reloadBtn.innerHTML = '<span>🔄</span> 重新加载游戏';
        }
        
        // 重新加载
        reloadBtn.addEventListener('click', loadGame);
        
        // 切换音量
        volumeBtn.addEventListener('click', function() {
            isMuted = !isMuted;
            if (rufflePlayer) {
                rufflePlayer.muted = isMuted;
            }
            this.innerHTML = isMuted ? 
                '<span>🔇</span> 恢复音量' : 
                '<span>🔊</span> 静音';
        });
        
        // 测试视频
        testVideoBtn.addEventListener('click', function() {
            gameContainer.style.display = 'none';
            rewardVideo.style.display = 'block';
            closeBtn.style.display = 'block';
            fullscreenBtn.style.display = 'block';
            
            rewardVideo.play().catch(e => {
                console.log('视频自动播放失败:', e);
                rewardVideo.controls = true;
            });
        });
        
        // 返回游戏
        closeBtn.addEventListener('click', function() {
            rewardVideo.style.display = 'none';
            this.style.display = 'none';
            fullscreenBtn.style.display = 'none';
            rewardVideo.pause();
            gameContainer.style.display = 'block';
        });
        
        // 全屏播放
        fullscreenBtn.addEventListener('click', function() {
            if (rewardVideo.requestFullscreen) {
                rewardVideo.requestFullscreen();
            } else if (rewardVideo.mozRequestFullScreen) {
                rewardVideo.mozRequestFullScreen();
            } else if (rewardVideo.webkitRequestFullscreen) {
                rewardVideo.webkitRequestFullscreen();
            } else if (rewardVideo.msRequestFullscreen) {
                rewardVideo.msRequestFullscreen();
            }
        });
        
        // 监听键盘事件
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
            }
        });
        
        // 页面加载后自动开始加载游戏
        window.addEventListener('DOMContentLoaded', loadGame);
        
        // 页面可见性变化处理
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && rufflePlayer) {
                rufflePlayer.pause();
            } else if (rufflePlayer) {
                rufflePlayer.play();
            }
        });
        
        // 窗口大小变化时调整播放器
        window.addEventListener('resize', function() {
            if (rufflePlayer) {
                rufflePlayer.style.width = '100%';
                rufflePlayer.style.height = '100%';
            }
        });
    </script>
</body>
</html>
