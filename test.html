<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳皇KOF7K - 通关解锁隐藏视频</title>
    
    <!-- 使用可靠的Ruffle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.1.0-nightly.2024.1.20/ruffle.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ffcc00, #ff9900);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #4cdfff;
            font-size: 1.3em;
        }
        
        /* 游戏容器 */
        .game-container {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }
        
        #gameScreen {
            width: 100%;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }
        
        /* 控制面板 */
        .control-panel {
            text-align: center;
            margin: 20px 0;
        }
        
        .game-btn {
            display: inline-block;
            padding: 15px 25px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin: 8px;
            min-width: 180px;
        }
        
        .game-btn:hover {
            background: linear-gradient(135deg, #40a9ff, #096dd9);
        }
        
        .game-btn.test {
            background: linear-gradient(135deg, #52c41a, #389e0d);
        }
        
        .game-btn.test:hover {
            background: linear-gradient(135deg, #73d13d, #52c41a);
        }
        
        /* 状态信息 */
        .status-info {
            text-align: center;
            margin: 20px 0;
            color: #ccccff;
            min-height: 24px;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #9999ff;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1 class="title">拳皇KOF7K 通关挑战</h1>
            <p class="subtitle">通关解锁隐藏视频</p>
        </div>
        
        <!-- 状态信息 -->
        <div class="status-info">
            <p id="loadStatus">系统准备就绪，点击下方按钮开始游戏</p>
        </div>
        
        <!-- 游戏容器 -->
        <div class="game-container">
            <div id="gameScreen">
                <div id="loadingText" style="text-align: center; color: #ccccff; padding: 20px;">
                    <div style="font-size: 3em; margin-bottom: 15px;">🎮</div>
                    <h2>拳皇KOF7K 格斗传承</h2>
                    <p style="margin-top: 15px;">光效华丽升级 | 新角色-卢卡尔 | 部分人物Bug修正</p>
                </div>
            </div>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <button class="game-btn" id="loadBtn">加载游戏</button>
            <button class="game-btn test" id="testBtn">测试通关</button>
        </div>
        
        <!-- 页脚 -->
        <div class="footer">
            <p>闪翼拳皇 1.91 - 格斗传承 | 使用Ruffle播放器加载Flash游戏</p>
            <p style="margin-top: 8px;">提示：通关后可解锁隐藏彩蛋视频</p>
        </div>
    </div>
    
    <!-- 通关视频弹窗 -->
    <div id="videoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#111; padding:20px; border-radius:10px; max-width:800px; width:90%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="color:#ffcc00;">🎁 通关奖励 - 隐藏彩蛋视频</h3>
                <button onclick="closeVideo()" style="background:#ff3333; color:white; border:none; width:30px; height:30px; border-radius:50%; cursor:pointer;">×</button>
            </div>
            <video id="hiddenVideo" controls style="width:100%; border-radius:5px;">
                <source src="reward_video.mp4" type="video/mp4">
                您的浏览器不支持视频播放
            </video>
        </div>
    </div>
    
    <script>
        // ==================== 修复核心：确保按钮事件绑定 ====================
        
        // 等待页面完全加载
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面已加载，开始初始化按钮事件...');
            
            // 获取按钮元素
            const loadBtn = document.getElementById('loadBtn');
            const testBtn = document.getElementById('testBtn');
            
            // 为加载游戏按钮添加事件监听
            loadBtn.addEventListener('click', function() {
                console.log('"加载游戏"按钮被点击');
                document.getElementById('loadStatus').textContent = '正在加载游戏...';
                loadGame();
            });
            
            // 为测试通关按钮添加事件监听
            testBtn.addEventListener('click', function() {
                console.log('"测试通关"按钮被点击');
                document.getElementById('loadStatus').textContent = '测试通关功能...';
                testVictory();
            });
            
            console.log('按钮事件绑定完成');
            
            // 初始化Ruffle配置
            if (window.RufflePlayer) {
                window.RufflePlayer.config = {
                    "autoplay": "on",
                    "unmuteOverlay": "hidden",
                    "backgroundColor": "#000000"
                };
                console.log('Ruffle配置完成');
            }
            
            // 检查是否已通关
            if (localStorage.getItem('kof_victory') === 'true') {
                console.log('检测到之前的通关状态');
                handleVictory();
            }
        });
        
        // ==================== 游戏功能函数 ====================
        let rufflePlayer = null;
        let isGameLoaded = false;
        let isVictory = false;
        
        async function loadGame() {
            console.log('开始加载游戏...');
            
            const gameScreen = document.getElementById('gameScreen');
            const loadBtn = document.getElementById('loadBtn');
            const loadStatus = document.getElementById('loadStatus');
            
            // 更新按钮状态
            loadBtn.disabled = true;
            loadBtn.textContent = '加载中...';
            
            try {
                // 1. 检查Ruffle播放器
                console.log('检查Ruffle播放器状态...');
                
                if (!window.RufflePlayer) {
                    throw new Error('Ruffle播放器未加载，请刷新页面重试');
                }
                
                if (!window.RufflePlayer.newest) {
                    throw new Error('Ruffle播放器版本不兼容');
                }
                
                // 2. 创建游戏容器
                gameScreen.innerHTML = '<div style="color:#ccccff; text-align:center; padding:40px;">游戏加载中，请稍候...</div>';
                loadStatus.textContent = '正在加载游戏文件...';
                
                // 3. 创建Ruffle播放器实例
                console.log('创建Ruffle播放器实例...');
                const ruffle = window.RufflePlayer.newest();
                rufflePlayer = ruffle.createPlayer();
                gameScreen.innerHTML = '';
                gameScreen.appendChild(rufflePlayer);
                
                // 4. 加载游戏文件
                console.log('开始加载游戏文件...');
                
                // 使用CDN链接
                const gameUrl = "https://cdn.jsdelivr.net/gh/zhaoguotao90/-kof7k-游戏-@main/kof7k_modified.swf";
                console.log('游戏文件URL:', gameUrl);
                
                // 设置超时
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('游戏加载超时')), 10000)
                );
                
                // 游戏加载
                const loadPromise = rufflePlayer.load({
                    url: gameUrl,
                    width: "100%",
                    height: 450
                });
                
                await Promise.race([loadPromise, timeoutPromise]);
                
                // 5. 加载成功
                console.log('游戏加载成功！');
                loadStatus.textContent = '✅ 游戏加载成功！请开始游戏。';
                loadBtn.textContent = '重新加载游戏';
                loadBtn.disabled = false;
                isGameLoaded = true;
                
                // 设置通关监听
                setupVictoryListener();
                
            } catch (error) {
                console.error('加载失败:', error);
                loadStatus.textContent = '❌ 游戏加载失败: ' + error.message;
                loadBtn.textContent = '重新加载';
                loadBtn.disabled = false;
                
                // 显示错误信息
                gameScreen.innerHTML = `
                    <div style="color:#ff6666; text-align:center; padding:40px;">
                        <div style="font-size:3em; margin-bottom:15px;">❌</div>
                        <h3>游戏加载失败</h3>
                        <p>${error.message}</p>
                        <p style="color:#ff9999; margin-top:15px;">请检查网络连接后重试</p>
                    </div>
                `;
            }
        }
        
        function setupVictoryListener() {
            console.log('设置通关监听器...');
            
            // 监听消息事件
            window.addEventListener("message", (event) => {
                if (event.data && event.data.type === "GAME_VICTORY") {
                    console.log('收到通关消息');
                    handleVictory();
                }
            });
            
            // 外部接口回调
            window.onGameVictory = function() {
                console.log('通过回调收到通关');
                handleVictory();
            };
        }
        
        function handleVictory() {
            if (isVictory) return;
            
            console.log('处理通关...');
            isVictory = true;
            document.getElementById('loadStatus').textContent = '🎉 恭喜通关！可以观看隐藏视频了';
            
            // 创建视频按钮
            const videoBtn = document.createElement('button');
            videoBtn.className = 'game-btn';
            videoBtn.style.background = 'linear-gradient(135deg, #ff3366, #cc2255)';
            videoBtn.textContent = '观看通关视频';
            videoBtn.onclick = showVideo;
            
            document.querySelector('.control-panel').appendChild(videoBtn);
            
            // 保存通关状态
            localStorage.setItem('kof_victory', 'true');
        }
        
        function showVideo() {
            console.log('显示通关视频');
            const videoModal = document.getElementById('videoModal');
            const video = document.getElementById('hiddenVideo');
            
            videoModal.style.display = 'flex';
            video.play().catch(e => {
                console.error('视频播放失败:', e);
                alert('视频播放失败，请确保视频文件存在');
            });
        }
        
        function closeVideo() {
            const videoModal = document.getElementById('videoModal');
            const video = document.getElementById('hiddenVideo');
            
            video.pause();
            video.currentTime = 0;
            videoModal.style.display = 'none';
        }
        
        function testVictory() {
            console.log('测试通关功能');
            handleVictory();
        }
    </script>
</body>
</html>
